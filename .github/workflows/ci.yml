name: CI / Build Proof

# This workflow proves source, migrations, browser journeys, and locally
# loadable production images. It never publishes to a deployment registry or
# mutates an environment. AWS ECR publication and ECS rollout belong only to
# aws-commercial-promote.yml after exact-SHA CI succeeds.

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # F-ARCH-7 (G1, multi-tenant migration gate): real service containers,
    # not sqlite/mocks — DATABASE_URL/REDIS_URL are live for the whole job so
    # the Postgres-gated integration test (test_auth_password.py::_requires_pg)
    # runs for real instead of skipping.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cadverify
          POSTGRES_PASSWORD: cadverify_ci
          POSTGRES_DB: cadverify
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cadverify -d cadverify"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://cadverify:cadverify_ci@localhost:5432/cadverify
      REDIS_URL: redis://localhost:6379
      RATE_LIMIT_DISABLED: "1"
      SIGNUP_RATE_LIMIT_DISABLED: "1"
      CADVERIFY_ENFORCE_SKIP_POLICY: "1"
      # CI keeps Redis live for worker/async coverage, but disables route/signup
      # throttles so unrelated integration tests do not share one job-wide
      # rate-limit bucket. backend/tests/test_rate_limit.py and
      # backend/tests/test_auth_signup_limits.py prove the throttles themselves.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-prod.txt
            backend/requirements-prod.lock
            backend/requirements-otel.txt
            backend/requirements-test.txt

      - name: Install native CAD/runtime libraries
        run: |
          # GitHub runners ship extra Microsoft apt feeds that occasionally
          # fail signature fetches independently of Ubuntu package health.
          # Disable only those runner-provided feeds before installing the CAD
          # libraries this job actually needs.
          for source in /etc/apt/sources.list.d/azure-cli.* /etc/apt/sources.list.d/microsoft-prod.*; do
            if [ -e "$source" ]; then
              sudo mv "$source" "$source.disabled"
            fi
          done
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get install -y --no-install-recommends \
            libgl1 \
            libglu1-mesa \
            libxcursor1 \
            libxfixes3 \
            libxft2 \
            libxinerama1 \
            libgomp1 \
            postgresql-client

      - name: Install dependencies
        run: |
          pip install --require-hashes -r requirements-prod.lock
          pip install -r requirements-test.txt

      - name: Real-database migration smoke (upgrade -> downgrade -> upgrade)
        # Proves the migration chain actually runs against Postgres and is
        # reversible — test_migration_*.py only mocks alembic.op and proves
        # nothing about real DDL. Ends at head so "Run tests" below sees a
        # fully migrated schema.
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

      - name: Postgres restore drill
        run: ../scripts/ops/postgres-restore-drill.sh

      - name: Run tests
        run: pytest -v

      - name: Alembic migration check
        run: |
          alembic heads
          pytest tests/test_migration_*.py -q

      - name: Typecheck
        run: |
          pip install pyright==1.1.411
          mkdir -p build
          pyright src/ --pythonversion 3.12 --pythonpath "$(python -c 'import sys; print(sys.executable)')" --outputjson > build/pyright-report.json || true
          python3 scripts/ci/check_pyright_baseline.py build/pyright-report.json
        # Blocking (F-ARCH-7): was continue-on-error: true, silently never
        # gating anything. It is now a real regression ratchet against
        # scripts/ci/pyright_baseline.txt — see that file + the checker
        # script's docstring for why it isn't a flat "0 errors" gate yet.

  route-auth-coverage:
    name: Every /api/v1 route calls require_api_key
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check routes.py for auth dependency on every /api/v1/* handler
        run: python3 scripts/ci/check_route_auth.py

  sentry-leak-grep:
    name: Auth material never appears in captured Sentry payload
    runs-on: ubuntu-latest
    needs: [route-auth-coverage]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd backend
          pip install --require-hashes -r requirements-prod.lock
          pip install -r requirements-test.txt
      - name: Capture scrubbed Sentry dump
        run: cd backend && pytest tests/test_sentry_leak.py -q
      - name: Reject captured auth-material sentinels
        run: |
          if grep -q "cv_live_[A-Za-z0-9_]\+" backend/build/captured_sentry.json; then
            echo "FAIL: cv_live_ leaked into captured Sentry payload"
            cat backend/build/captured_sentry.json
            exit 1
          fi
          for sentinel in \
            FAKE_SESSION_SENTINEL \
            FAKE_MAGIC_TOKEN_SENTINEL \
            FAKE_PASSWORD_SENTINEL \
            FAKE_TURNSTILE_SENTINEL; do
            if grep -q "$sentinel" backend/build/captured_sentry.json; then
              echo "FAIL: auth material leaked into captured Sentry payload"
              exit 1
            fi
          done
          echo "sentry-leak-grep OK"

  security-scan:
    name: SAST (bandit) + dependency CVEs (pip-audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install scanners
        # Static analysis / manifest audit only — neither tool needs the heavy
        # CAD runtime deps, so this job stays fast and independent of `backend`.
        run: pip install bandit==1.9.4 pip-audit==2.10.1 pip-tools==7.5.3
      - name: Production dependency lock is current
        run: |
          pip-compile --quiet --generate-hashes --resolver=backtracking --strip-extras \
            --no-header --no-annotate \
            --output-file /tmp/requirements-prod.lock requirements-prod.txt
          diff -u requirements-prod.lock /tmp/requirements-prod.lock
      - name: Bandit SAST (fail on medium+ severity)
        # -ll = report (and non-zero exit on) MEDIUM+ severity. False positives
        # are suppressed inline with justified `# nosec B<id>` comments; true
        # positives were fixed. A NEW medium/high finding fails the build.
        run: |
          mkdir -p ../outputs/security-proof
          bandit -r src/ -ll | tee ../outputs/security-proof/bandit-ci.txt
      - name: pip-audit exact production dependency graph
        # The lock is complete, exact, and hashed, so dependency resolution is
        # disabled and every shipped package is audited without test-only waivers.
        run: |
          pip-audit -r requirements-prod.lock --no-deps --disable-pip \
            --progress-spinner off \
            | tee ../outputs/security-proof/pip-audit-ci.txt

  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependency graph
        run: npm audit --audit-level=moderate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  browser-e2e:
    name: Browser E2E (human + enterprise)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cadverify
          POSTGRES_PASSWORD: cadverify_ci
          POSTGRES_DB: cadverify
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cadverify -d cadverify"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://cadverify:cadverify_ci@localhost:5432/cadverify
      REDIS_URL: redis://localhost:6379
      RATE_LIMIT_DISABLED: "1"
      SIGNUP_RATE_LIMIT_DISABLED: "1"
      RATE_LIBRARY_ENABLED: "1"
      SHOP_LIBRARY_ENABLED: "1"
      MATERIAL_LIBRARY_ENABLED: "1"
      E2E_RUN_ID: ci-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-prod.txt
            backend/requirements-prod.lock
            backend/requirements-otel.txt
            backend/requirements-test.txt

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: browser-actions/setup-chrome@c785b87e244131f27c9f19c1a33e2ead956ab7ce # v1

      - name: Install backend dependencies
        run: |
          for source in /etc/apt/sources.list.d/azure-cli.* /etc/apt/sources.list.d/microsoft-prod.*; do
            if [ -e "$source" ]; then
              sudo mv "$source" "$source.disabled"
            fi
          done
          sudo apt-get update -o Acquire::Retries=3
          sudo apt-get install -y --no-install-recommends \
            libgl1 \
            libglu1-mesa \
            libxcursor1 \
            libxfixes3 \
            libxft2 \
            libxinerama1 \
            libgomp1 \
            postgresql-client
          python -m venv backend/.venv
          backend/.venv/bin/python -m pip install --upgrade pip
          backend/.venv/bin/python -m pip install --require-hashes -r backend/requirements-prod.lock
          backend/.venv/bin/python -m pip install -r backend/requirements-test.txt

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Start full local app
        run: |
          set -euo pipefail
          bash scripts/run-local-app.sh > e2e-app.log 2>&1 &
          echo $! > e2e-app.pid
          for _ in $(seq 1 180); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null \
              && curl -fsS http://localhost:3000 >/dev/null; then
              echo "Local app is ready."
              exit 0
            fi
            if ! kill -0 "$(cat e2e-app.pid)" 2>/dev/null; then
              echo "Local app exited before becoming ready."
              tail -300 e2e-app.log || true
              exit 1
            fi
            sleep 2
          done
          echo "Timed out waiting for local app."
          tail -300 e2e-app.log || true
          exit 1

      - name: Run human and enterprise browser journeys
        env:
          E2E_FAIL_ON_UNAVAILABLE: "1"
        run: npm run test:e2e:full --prefix frontend

      - name: Upload browser E2E artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: browser-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .gstack/qa-reports/*.json
            .gstack/qa-reports/*.md
            .gstack/qa-reports/screenshots/**
            e2e-app.log
          if-no-files-found: warn
          include-hidden-files: true

      - name: Stop local app
        if: always()
        run: |
          if [ -f e2e-app.pid ]; then
            kill "$(cat e2e-app.pid)" 2>/dev/null || true
          fi
          sleep 3
          pkill -f "uvicorn main:app" 2>/dev/null || true
          pkill -f "next start" 2>/dev/null || true
          pkill -f "arq src.jobs.worker.WorkerSettings" 2>/dev/null || true

  docker-build:
    name: Container Images & Deployment Contract Proof
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Validate Compose deploy configs
        run: |
          printf '%s\n' \
            'POSTGRES_PASSWORD=cadverify_ci' \
            'DATABASE_URL=postgresql+asyncpg://cadverify:cadverify_ci@postgres:5432/cadverify' \
            'REDIS_URL=redis://redis:6379/0' \
            > .env
          cp cadverify-enterprise/.env.example cadverify-enterprise/.env
          docker compose -f docker-compose.yml config --quiet
          docker compose -f cadverify-enterprise/docker-compose.yml config --quiet

      - name: Lint and render Helm chart
        run: |
          helm lint charts/cadverify
          helm template cadverify charts/cadverify -f charts/cadverify/values-enterprise.yaml >/tmp/cadverify-rendered.yaml
          helm template cadverify charts/cadverify \
            -f charts/cadverify/values-regulated.yaml \
            --set production.operatorAcknowledgement=CONFIGURED_EXTERNAL_DEPENDENCIES \
            --set production.documentationRenderOnly=true \
            >/tmp/cadverify-regulated-rendered.yaml
          node scripts/ops/check-regulated-manifest.mjs /tmp/cadverify-regulated-rendered.yaml

      # CI proves locally loadable production images without requiring access to
      # any deployment account. The protected AWS promotion workflow owns ECR
      # authentication, immutable pushes, migrations, and ECS rollout.
      - name: Build frontend production image
        id: frontend-image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: frontend
          push: false
          load: true
          tags: proofshape-ci/frontend:${{ github.sha }}
          platforms: linux/amd64
          # NEXT_PUBLIC_SENTRY_DSN must be a build-time value -- Next.js inlines
          # NEXT_PUBLIC_* into the browser bundle at `next build`, so a runtime
          # container secret alone never reaches client-side Sentry (see
          # frontend/Dockerfile). Empty when the repo secret is unset, which
          # keeps Sentry.init(...).enabled false (no-op), matching every other
          # environment that doesn't set the DSN.
          build-args: |
            NEXT_PUBLIC_SENTRY_DSN=${{ vars.NEXT_PUBLIC_SENTRY_DSN }}
            NEXT_PUBLIC_SENTRY_RELEASE=${{ github.sha }}
          cache-from: type=gha,scope=frontend-image
          cache-to: type=gha,mode=max,scope=frontend-image

      - name: Build backend production image
        id: backend-image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: backend
          push: false
          load: true
          tags: proofshape-ci/backend:${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha,scope=backend-image
          cache-to: type=gha,mode=max,scope=backend-image

      - name: Prepare image security evidence directory
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: mkdir -p outputs/security-proof

      - name: Scan frontend image (high/critical vulnerabilities)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: proofshape-ci/frontend:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: false

      - name: Scan backend image (high/critical vulnerabilities)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: proofshape-ci/backend:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: false

      - name: Generate frontend CycloneDX SBOM
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: proofshape-ci/frontend:${{ github.sha }}
          format: cyclonedx
          output: outputs/security-proof/frontend-${{ github.sha }}.cdx.json

      - name: Generate backend CycloneDX SBOM
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: proofshape-ci/backend:${{ github.sha }}
          format: cyclonedx
          output: outputs/security-proof/backend-${{ github.sha }}.cdx.json

      - name: Write source-bound container build manifest
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          BACKEND_IMAGE_ID=$(docker image inspect "proofshape-ci/backend:${GITHUB_SHA}" --format '{{.Id}}')
          FRONTEND_IMAGE_ID=$(docker image inspect "proofshape-ci/frontend:${GITHUB_SHA}" --format '{{.Id}}')
          case "$BACKEND_IMAGE_ID" in sha256:*) ;; *) echo "backend image id is missing"; exit 1 ;; esac
          case "$FRONTEND_IMAGE_ID" in sha256:*) ;; *) echo "frontend image id is missing"; exit 1 ;; esac
          jq -n \
            --arg source_sha "$GITHUB_SHA" \
            --arg backend_local_image_id "$BACKEND_IMAGE_ID" \
            --arg frontend_local_image_id "$FRONTEND_IMAGE_ID" \
            '{claim: "CI_BUILD_PROOF", source_sha: $source_sha, backend_local_image_id: $backend_local_image_id, frontend_local_image_id: $frontend_local_image_id}' \
            > outputs/security-proof/build-manifest.json

      - name: Upload container build and security evidence
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: container-build-proof-${{ github.sha }}
          path: outputs/security-proof/*
          if-no-files-found: error
