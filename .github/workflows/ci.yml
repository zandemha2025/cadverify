name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: pytest -v

      - name: Alembic migration check
        run: |
          DATABASE_URL=sqlite:///test_migrations.db alembic upgrade head
          DATABASE_URL=sqlite:///test_migrations.db alembic downgrade -1
          DATABASE_URL=sqlite:///test_migrations.db alembic upgrade head
          rm -f test_migrations.db

      - name: Typecheck
        run: |
          pip install pyright
          pyright src/ --pythonversion 3.12
        continue-on-error: true

  route-auth-coverage:
    name: Every /api/v1 route calls require_api_key
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check routes.py for auth dependency on every /api/v1/* handler
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import re, sys
          txt = open("backend/src/api/routes.py").read()
          decorators = re.finditer(r'@router\.(post|get|put|delete|patch)\((.*?)\)', txt, flags=re.S)
          fails = []
          for m in decorators:
              start = m.start()
              block = txt[start:start+1500]
              # skip public routes
              if re.search(r'"(/health|/auth/|/s/)', m.group(2)):
                  continue
              # must reference require_api_key in the function signature block
              if 'require_api_key' not in block:
                  fails.append(m.group(2).splitlines()[0])
          if fails:
              print("ROUTE AUTH COVERAGE FAIL:")
              for f in fails: print("  ", f)
              sys.exit(1)
          print("route-auth-coverage OK")
          PY

  sentry-leak-grep:
    name: cv_live_ never appears in captured Sentry payload
    runs-on: ubuntu-latest
    needs: [route-auth-coverage]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: cd backend && pip install -r requirements.txt
      - name: Capture scrubbed Sentry dump
        run: cd backend && pytest tests/test_sentry_leak.py -q
      - name: Grep captured Sentry dump for cv_live_ leak
        run: |
          if grep -q "cv_live_[A-Za-z0-9_]\+" backend/build/captured_sentry.json; then
            echo "FAIL: cv_live_ leaked into captured Sentry payload"
            cat backend/build/captured_sentry.json
            exit 1
          fi
          echo "sentry-leak-grep OK"

  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Fly.io Registry
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "${{ secrets.FLY_API_TOKEN }}" | docker login registry.fly.io -u x --password-stdin

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: registry.fly.io/cadverify-api:${{ github.sha }},registry.fly.io/cadverify-api:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy backend (pre-built image)
        run: |
          flyctl deploy \
            --config backend/fly.toml \
            --image registry.fly.io/cadverify-api:${{ github.sha }} \
            --env RELEASE=${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
