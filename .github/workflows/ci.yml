name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: pytest -v

  route-auth-coverage:
    name: Every /api/v1 route calls require_api_key
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check routes.py for auth dependency on every /api/v1/* handler
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import re, sys
          txt = open("backend/src/api/routes.py").read()
          decorators = re.finditer(r'@router\.(post|get|put|delete|patch)\((.*?)\)', txt, flags=re.S)
          fails = []
          for m in decorators:
              start = m.start()
              block = txt[start:start+1500]
              # skip public routes
              if re.search(r'"(/health|/auth/|/s/)', m.group(2)):
                  continue
              # must reference require_api_key in the function signature block
              if 'require_api_key' not in block:
                  fails.append(m.group(2).splitlines()[0])
          if fails:
              print("ROUTE AUTH COVERAGE FAIL:")
              for f in fails: print("  ", f)
              sys.exit(1)
          print("route-auth-coverage OK")
          PY

  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy backend
        run: flyctl deploy --config backend/fly.toml --dockerfile backend/Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy frontend
        run: flyctl deploy --config frontend/fly.toml --dockerfile frontend/Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
