name: Regulated Image Release

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS GovCloud region
        required: true
        type: choice
        options:
          - us-gov-west-1
          - us-gov-east-1

concurrency:
  group: regulated-release
  cancel-in-progress: false

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  build-sign:
    name: Build, scan, attest, and sign GovCloud images
    if: github.ref == 'refs/heads/main'
    # The runner is an ephemeral, approved U.S.-person-operated runner inside
    # the regulated boundary. Do not substitute a GitHub-hosted runner.
    runs-on: [self-hosted, linux, x64, govcloud, us-person]
    environment: regulated-release
    env:
      AWS_REGION: ${{ inputs.aws_region }}
      BACKEND_REPOSITORY: ${{ vars.AWS_GOVCLOUD_BACKEND_REPOSITORY }}
      FRONTEND_REPOSITORY: ${{ vars.AWS_GOVCLOUD_FRONTEND_REPOSITORY }}
      COSIGN_KMS_URI: ${{ vars.AWS_GOVCLOUD_COSIGN_KMS_URI }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate release inputs
        env:
          RELEASE_ROLE_ARN: ${{ secrets.AWS_GOVCLOUD_RELEASE_ROLE_ARN }}
        run: |
          test -n "$RELEASE_ROLE_ARN" || { echo "AWS_GOVCLOUD_RELEASE_ROLE_ARN is required"; exit 1; }
          test -n "$BACKEND_REPOSITORY" || { echo "AWS_GOVCLOUD_BACKEND_REPOSITORY is required"; exit 1; }
          test -n "$FRONTEND_REPOSITORY" || { echo "AWS_GOVCLOUD_FRONTEND_REPOSITORY is required"; exit 1; }
          test -n "$COSIGN_KMS_URI" || { echo "AWS_GOVCLOUD_COSIGN_KMS_URI is required"; exit 1; }
          command -v jq >/dev/null || { echo "jq is required on the regulated runner"; exit 1; }
          command -v gh >/dev/null || { echo "gh is required on the regulated runner"; exit 1; }

      - name: Require protected main and green CI for this exact source SHA
        run: |
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA" || {
            echo "checked-out source does not match the workflow SHA"
            exit 1
          }
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
            echo "regulated release source is not reachable from protected main"
            exit 1
          }
          ci_run_id=$(gh run list \
            --workflow ci.yml \
            --commit "$GITHUB_SHA" \
            --event push \
            --status success \
            --limit 1 \
            --json databaseId,headSha \
            --jq 'map(select(.headSha == env.GITHUB_SHA))[0].databaseId // empty')
          test -n "$ci_run_id" || {
            echo "No successful CI run exists for this exact regulated release SHA"
            exit 1
          }

      - name: Configure GovCloud credentials through GitHub OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_GOVCLOUD_RELEASE_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Log in to GovCloud ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1

      - name: Build and push backend
        id: backend
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: backend
          push: true
          platforms: linux/amd64
          tags: ${{ steps.ecr.outputs.registry }}/${{ env.BACKEND_REPOSITORY }}:${{ github.sha }}
          provenance: mode=max
          sbom: true

      - name: Build and push frontend
        id: frontend
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: frontend
          push: true
          platforms: linux/amd64
          tags: ${{ steps.ecr.outputs.registry }}/${{ env.FRONTEND_REPOSITORY }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SENTRY_DSN=
            NEXT_PUBLIC_SENTRY_RELEASE=${{ github.sha }}
          provenance: mode=max
          sbom: true

      - name: Scan backend image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.ecr.outputs.registry }}/${{ env.BACKEND_REPOSITORY }}@${{ steps.backend.outputs.digest }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: false

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.ecr.outputs.registry }}/${{ env.FRONTEND_REPOSITORY }}@${{ steps.frontend.outputs.digest }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: false

      - name: Sign digests with GovCloud KMS (no public transparency log)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          BACKEND_DIGEST: ${{ steps.backend.outputs.digest }}
          FRONTEND_DIGEST: ${{ steps.frontend.outputs.digest }}
        run: |
          cosign sign --yes --tlog-upload=false --key "$COSIGN_KMS_URI" "$REGISTRY/$BACKEND_REPOSITORY@$BACKEND_DIGEST"
          cosign sign --yes --tlog-upload=false --key "$COSIGN_KMS_URI" "$REGISTRY/$FRONTEND_REPOSITORY@$FRONTEND_DIGEST"
          cosign verify --insecure-ignore-tlog --key "$COSIGN_KMS_URI" "$REGISTRY/$BACKEND_REPOSITORY@$BACKEND_DIGEST"
          cosign verify --insecure-ignore-tlog --key "$COSIGN_KMS_URI" "$REGISTRY/$FRONTEND_REPOSITORY@$FRONTEND_DIGEST"

      - name: Attach signed release-configuration attestations
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          BACKEND_DIGEST: ${{ steps.backend.outputs.digest }}
          FRONTEND_DIGEST: ${{ steps.frontend.outputs.digest }}
        run: |
          mkdir -p outputs/regulated-release
          jq -n \
            --arg component backend \
            --arg release_sha "$GITHUB_SHA" \
            '{component: $component, release_sha: $release_sha}' \
            > outputs/regulated-release/backend-predicate.json
          jq -n \
            --arg component frontend \
            --arg release_sha "$GITHUB_SHA" \
            '{component: $component, release_sha: $release_sha}' \
            > outputs/regulated-release/frontend-predicate.json
          cosign attest --yes --tlog-upload=false --type custom \
            --predicate outputs/regulated-release/backend-predicate.json \
            --key "$COSIGN_KMS_URI" \
            "$REGISTRY/$BACKEND_REPOSITORY@$BACKEND_DIGEST"
          cosign attest --yes --tlog-upload=false --type custom \
            --predicate outputs/regulated-release/frontend-predicate.json \
            --key "$COSIGN_KMS_URI" \
            "$REGISTRY/$FRONTEND_REPOSITORY@$FRONTEND_DIGEST"
          cosign verify-attestation --insecure-ignore-tlog --type custom \
            --key "$COSIGN_KMS_URI" \
            "$REGISTRY/$BACKEND_REPOSITORY@$BACKEND_DIGEST" >/dev/null
          cosign verify-attestation --insecure-ignore-tlog --type custom \
            --key "$COSIGN_KMS_URI" \
            "$REGISTRY/$FRONTEND_REPOSITORY@$FRONTEND_DIGEST" >/dev/null

      - name: Write non-secret release manifest
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          BACKEND_DIGEST: ${{ steps.backend.outputs.digest }}
          FRONTEND_DIGEST: ${{ steps.frontend.outputs.digest }}
        run: |
          mkdir -p outputs/regulated-release
          printf '%s\n' \
            "release_sha=${GITHUB_SHA}" \
            "aws_region=${AWS_REGION}" \
            "backend_image=${REGISTRY}/${BACKEND_REPOSITORY}@${BACKEND_DIGEST}" \
            "frontend_image=${REGISTRY}/${FRONTEND_REPOSITORY}@${FRONTEND_DIGEST}" \
            > outputs/regulated-release/release-manifest.txt

      - name: Remove predicate working files
        if: always()
        run: rm -f outputs/regulated-release/*-predicate.json

      - name: Upload regulated release evidence
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: regulated-release-${{ github.sha }}
          path: outputs/regulated-release/release-manifest.txt
          if-no-files-found: error
