app = "cadvrfy-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[processes]
  web = "uvicorn main:app --host 0.0.0.0 --port 8000 --workers 1 --no-server-header"
  worker = "arq src.jobs.worker.WorkerSettings"

[env]
  # Launch config: password login + magic-link, no Google OAuth. Magic-link
  # is decoupled from AUTH_MODE (see backend/main.py:_magic_link_enabled) —
  # it mounts here because MAGIC_LINK_ENABLED is forced on below (belt and
  # suspenders; it would also auto-enable once RESEND_API_KEY,
  # MAGIC_LINK_SECRET, and DASHBOARD_ORIGIN are all set via `fly secrets
  # set`). Do NOT put those secret values here — only `fly secrets set`.
  AUTH_MODE = "password"
  MAGIC_LINK_ENABLED = "true"
  LOG_LEVEL = "INFO"
  MAX_UPLOAD_MB = "100"
  DEMO_MAX_TRIANGLES = "500000"
  SAM3D_ENABLED = "false"
  ACCEPTING_NEW_ANALYSES = "true"
  RATE_LIBRARY_ENABLED = "1"
  ANALYSIS_TIMEOUT_SEC = "60"
  BLOB_STORAGE_PATH = "/data/blobs"
  ARQ_HEALTH_KEY = "arq:queue:health-check"
  WORKER_STRICT_HEALTH = "1"

[http_service]
  processes = ["web"]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  # Launch hardening: 10 orgs share this app. min_machines_running is scoped
  # to the "web" process group only (processes = ["web"], above), so this does
  # NOT change the always-on worker. Was 1 -- bumped to 2 so one org's burst of
  # concurrent STEP parses can't starve another org's requests behind a single
  # uvicorn machine at 50 in-flight requests. NOTE: this key only keeps
  # existing machines from being suspended below this count -- it does not by
  # itself create a second machine. The actual machine count is set with
  # `fly scale count web=2 worker=1 --app cadvrfy-api` (see
  # docs/LAUNCH_RUNBOOK.md and .github/workflows/ci.yml's "Ensure backend web
  # and worker process groups" step, which pins this on every deploy).
  min_machines_running = 2

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    # Raised from 25 -> 40: with 2 web machines already providing headroom,
    # push the soft limit closer to hard_limit so Fly is less eager to spin up
    # extra (billed) machines under ordinary bursty load; hard_limit=50 still
    # caps in-flight requests per machine before Fly queues/adds capacity.
    soft_limit = 40

[[mounts]]
  source = "cadverify_data"
  destination = "/data"
  processes = ["web", "worker"]
  initial_size = "1gb"

# Worker process: always-on, no auto-stop (SAM-3D jobs are long-running).
# Stays at 1 -- unlike web, worker headroom is not a launch requirement (arq
# already fans a single worker process out across max_jobs concurrent jobs;
# see src/jobs/worker.py). Scale independently later if queue depth warrants it.
[[machines]]
  processes = ["worker"]
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[deploy]
  release_command = "sh -c 'DATABASE_URL=$DATABASE_URL_DIRECT alembic upgrade head'"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2
