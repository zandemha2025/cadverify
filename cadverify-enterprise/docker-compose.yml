services:
  backend:
    image: cadverify-backend:latest
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - PORT=8000
      - AUTH_MODE=${AUTH_MODE:-saml}
      - SAML_ENABLED=${SAML_ENABLED:-true}
      - SAML_CONFIG_DIR=/app/saml
      - RATE_LIBRARY_ENABLED=1
    volumes:
      - ./saml:/app/saml:ro
      - blobs:/data/blobs
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  worker:
    image: cadverify-backend:latest
    command: ["arq", "src.jobs.worker.WorkerSettings"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - AUTH_MODE=${AUTH_MODE:-saml}
      - SAML_ENABLED=${SAML_ENABLED:-true}
      - SAML_CONFIG_DIR=/app/saml
      - RATE_LIBRARY_ENABLED=1
    volumes:
      - ./saml:/app/saml:ro
      - blobs:/data/blobs

  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: cadverify
      POSTGRES_USER: cadverify
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cadverify"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  frontend:
    image: cadverify-frontend:latest
    ports:
      - "3000:3000"
    environment:
      - API_BASE=http://backend:8000
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "require('http').get('http://127.0.0.1:3000', (res) => process.exit(res.statusCode >= 200 && res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
  redis-data:
  blobs:
