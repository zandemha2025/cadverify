{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "cadverify.fullname" . }}
  labels:
    {{- include "cadverify.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # Keep the backend prefix narrow. Next owns /api/auth, /api/proxy,
          # and /api/public-share; a broad /api backend rule shadows those
          # first-party routes and breaks every browser session flow.
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: {{ include "cadverify.fullname" . }}-backend
                port:
                  number: 8000
          - path: /scim/v2
            pathType: Prefix
            backend:
              service:
                name: {{ include "cadverify.fullname" . }}-backend
                port:
                  number: 8000
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: {{ include "cadverify.fullname" . }}-backend
                port:
                  number: 8000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: {{ include "cadverify.fullname" . }}-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "cadverify.fullname" . }}-frontend
                port:
                  number: 3000
{{- end }}
