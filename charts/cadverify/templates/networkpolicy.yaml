{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cadverify.fullname" . }}-default-deny
  labels:
    {{- include "cadverify.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cadverify.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cadverify.fullname" . }}-frontend
  labels:
    {{- include "cadverify.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cadverify.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressControllerNamespaceLabels | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressControllerPodLabels | nindent 14 }}
      ports:
        - {protocol: TCP, port: 3000}
  egress:
    - to:
        - podSelector:
            matchLabels:
              {{- include "cadverify.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: backend
      ports:
        - {protocol: TCP, port: 8000}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cadverify.fullname" . }}-backend
  labels:
    {{- include "cadverify.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cadverify.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "cadverify.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: frontend
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressControllerNamespaceLabels | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingressControllerPodLabels | nindent 14 }}
      ports:
        - {protocol: TCP, port: 8000}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
    - to:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.observabilityNamespaceLabels | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.observabilityPodLabels | nindent 14 }}
      ports:
        - {protocol: TCP, port: 4317}
        - {protocol: TCP, port: 4318}
    {{- range .Values.networkPolicy.backendEgressRules }}
    - to:
        - ipBlock:
            cidr: {{ .cidr | quote }}
      ports:
        {{- range .ports }}
        - protocol: {{ default "TCP" .protocol }}
          port: {{ .port }}
        {{- end }}
    {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cadverify.fullname" . }}-worker
  labels:
    {{- include "cadverify.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cadverify.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  policyTypes: [Ingress, Egress]
  ingress: []
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
    - to:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.observabilityNamespaceLabels | nindent 14 }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.observabilityPodLabels | nindent 14 }}
      ports:
        - {protocol: TCP, port: 4317}
        - {protocol: TCP, port: 4318}
    {{- range .Values.networkPolicy.workerEgressRules }}
    - to:
        - ipBlock:
            cidr: {{ .cidr | quote }}
      ports:
        {{- range .ports }}
        - protocol: {{ default "TCP" .protocol }}
          port: {{ .port }}
        {{- end }}
    {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cadverify.fullname" . }}-migrate
  labels:
    {{- include "cadverify.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cadverify.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: migrate
  policyTypes: [Ingress, Egress]
  ingress: []
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
    {{- range .Values.networkPolicy.migrationEgressRules }}
    - to:
        - ipBlock:
            cidr: {{ .cidr | quote }}
      ports:
        {{- range .ports }}
        - protocol: {{ default "TCP" .protocol }}
          port: {{ .port }}
        {{- end }}
    {{- end }}
{{- end }}
