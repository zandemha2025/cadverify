{{- if .Values.saml.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cadverify.fullname" . }}-saml
  labels:
    {{- include "cadverify.labels" . | nindent 4 }}
type: Opaque
stringData:
  sp-key.pem: {{ (.Values.samlSecrets).spKey | default "" | quote }}
  sp-cert.pem: {{ (.Values.samlSecrets).spCert | default "" | quote }}
{{- end }}
