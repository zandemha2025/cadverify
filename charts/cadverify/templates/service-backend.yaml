apiVersion: v1
kind: Service
metadata:
  name: {{ include "cadverify.fullname" . }}-backend
  labels:
    {{- include "cadverify.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    {{- include "cadverify.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
