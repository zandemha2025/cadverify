apiVersion: v1
kind: Service
metadata:
  name: {{ include "cadverify.fullname" . }}-frontend
  labels:
    {{- include "cadverify.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    {{- include "cadverify.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
