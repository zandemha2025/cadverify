# Legacy air-gapped/on-prem overlay. New regulated cloud deployments should use
# values-regulated.yaml and the production runbook. This file stays compatible
# with disconnected image-loading workflows.
image:
  backend:
    pullPolicy: Never
  frontend:
    pullPolicy: Never

auth:
  mode: "saml"

saml:
  enabled: true

audit:
  enabled: true

rbac:
  defaultRole: "viewer"
