<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>ProofShape — zero-to-evidence platform guide</title>
  <style>
    :root {
      --bg:#f6f6f7; --panel:#fff; --hair:#e2e2e6; --ink:#17181a;
      --muted:rgba(23,24,26,.66); --blue:#3772ab; --shop:#a06030;
      --user:#745cc7; --default:#69707d; --pass:#1d7f54;
      --warn:#966614; --fail:#c2453a; --shadow:0 24px 80px rgba(20,28,42,.14);
      --theater:#050506; --theater-panel:#0b0c0f; --theater-ink:#f5f5f7;
      --scan:#9fc3e4; --local:#55b880; --staging:#d9a856; --unsupported:#c96a5e;
      --sans:"Helvetica Neue",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
      --mono:ui-monospace,"SF Mono","SFMono-Regular",Menlo,monospace;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--theater);color:var(--theater-ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
    button,input,select{font:inherit}
    button{cursor:pointer}
    button:disabled{cursor:not-allowed;opacity:.38}
    button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible,.slide:focus-visible,summary:focus-visible{outline:3px solid #74aee0;outline-offset:3px}
    .skip-link{position:fixed;left:16px;top:10px;z-index:100;transform:translateY(-160%);padding:10px 14px;border-radius:999px;background:var(--theater-ink);color:var(--theater);font:12px var(--mono);text-decoration:none}.skip-link:focus{transform:none}
    .sr-only{position:absolute!important;width:1px!important;height:1px!important;padding:0!important;margin:-1px!important;overflow:hidden!important;clip:rect(0,0,0,0)!important;white-space:nowrap!important;border:0!important}
    .app{min-height:100vh;display:grid;grid-template-rows:58px 1fr 54px;background:var(--theater)}
    .topbar{position:sticky;top:0;z-index:20;display:grid;grid-template-columns:auto minmax(80px,1fr) auto;align-items:center;gap:24px;padding:0 24px;border-bottom:1px solid rgba(245,245,247,.1);background:rgba(5,5,6,.94);backdrop-filter:blur(18px)}
    .wordmark{font-weight:600;letter-spacing:-.03em}.wordmark small{font:10px var(--mono);letter-spacing:.15em;color:rgba(245,245,247,.45);margin-left:10px}
    .progress-track{height:2px;background:rgba(245,245,247,.09);position:relative}.progress-bar{height:100%;background:var(--scan);transition:width .35s ease}
    .top-actions{display:flex;align-items:center;gap:8px}
    .icon-btn,.nav-btn,.section-btn,.role-btn,.check-btn{border:1px solid rgba(245,245,247,.16);background:transparent;color:#f5f5f7;border-radius:999px;padding:8px 13px}
    .icon-btn:hover,.nav-btn:hover,.section-btn:hover,.role-btn:hover{background:#f5f5f7;color:#050506}
    .counter{font:11px var(--mono);color:rgba(245,245,247,.6);min-width:56px;text-align:center}
    main{position:relative;min-height:0;overflow:hidden}
    .deck{height:calc(100vh - 112px);position:relative;touch-action:pan-y}
    .slide{position:absolute;inset:0;display:grid;grid-template-columns:minmax(340px,.86fr) minmax(520px,1.35fr);gap:46px;padding:54px clamp(34px,6vw,94px);opacity:0;pointer-events:none;transform:translateX(30px);transition:opacity .32s ease,transform .32s ease;background:var(--bg);color:var(--ink);overflow:auto}
    .slide.active{opacity:1;pointer-events:auto;transform:none}
    .slide[inert]{visibility:hidden}
    .slide.dark{background:#050506;color:#f5f5f7}
    .slide.no-image{grid-template-columns:1fr}.slide.no-image .copy{max-width:1060px;margin:auto;width:100%}
    .copy{display:flex;flex-direction:column;justify-content:center;min-width:0}
    .eyebrow{margin:0 0 16px;font:11px var(--mono);letter-spacing:.22em;text-transform:uppercase;color:var(--blue)}
    .dark .eyebrow{color:#9fc3e4}
    h1,h2{margin:0;font-weight:350;letter-spacing:-.045em;line-height:1.02;text-wrap:balance}
    h1{font-size:clamp(46px,6.2vw,88px)}h2{font-size:clamp(38px,4.3vw,64px)}
    .lede{font-size:clamp(17px,1.55vw,23px);line-height:1.46;color:var(--muted);max-width:760px;margin:22px 0 0}
    .dark .lede{color:rgba(245,245,247,.62)}
    .steps{display:grid;gap:10px;margin:28px 0 0;padding:0;list-style:none}
    .step{display:grid;grid-template-columns:34px 1fr;gap:12px;align-items:start;padding:12px 0;border-top:1px solid var(--hair);font-size:16px;line-height:1.4}
    .step-text,.expected,.evidence{min-width:0;overflow-wrap:anywhere}
    .dark .step{border-color:rgba(245,245,247,.1)}
    .step button{width:28px;height:28px;border:1px solid var(--hair);border-radius:7px;background:var(--panel);color:var(--ink);font:12px var(--mono)}
    .dark .step button{border-color:rgba(245,245,247,.18);background:#0b0c0f;color:#f5f5f7}
    .step.done button{background:var(--pass);border-color:var(--pass);color:#fff}.step.done .step-text{text-decoration:line-through;color:var(--muted)}
    .expected{margin-top:20px;padding:15px 17px;border-left:3px solid var(--pass);background:rgba(29,127,84,.07);font-size:15px;line-height:1.45}
    .expected.mixed{border-left-color:var(--warn);background:rgba(150,102,20,.08)}.expected.external{border-left-color:var(--warn);background:rgba(150,102,20,.08)}.expected.unsupported{border-left-color:var(--fail);background:rgba(194,69,58,.07)}
    .dark .expected{background:rgba(85,184,128,.08)}.dark .expected.mixed,.dark .expected.external{border-left-color:var(--staging);background:rgba(217,168,86,.08)}.dark .expected.unsupported{border-left-color:var(--unsupported);background:rgba(201,106,94,.08)}
    .claim-refs{display:block;margin-top:5px;font:9px/1.35 var(--mono);letter-spacing:.04em;color:var(--blue);text-transform:uppercase}.dark .claim-refs{color:var(--scan)}
    .evidence{margin-top:14px;font:10px/1.45 var(--mono);letter-spacing:.04em;color:var(--muted)}
    .evidence summary{display:inline-flex;align-items:center;gap:7px;min-height:32px;cursor:pointer;color:inherit}.evidence summary::marker{color:var(--blue)}.evidence-body{margin-top:7px;padding:10px 12px;border:1px solid var(--hair);border-radius:10px;background:rgba(255,255,255,.55)}.dark .evidence-body{border-color:rgba(245,245,247,.12);background:rgba(255,255,255,.03)}
    .dark .evidence{color:rgba(245,245,247,.42)}
    .media{position:relative;display:flex;align-items:center;justify-content:center;min-width:0}
    .media-frame{position:relative;width:100%;max-height:100%;border:1px solid var(--hair);border-radius:18px;background:var(--panel);padding:10px;box-shadow:var(--shadow);overflow:hidden}
    .dark .media-frame{background:#0b0c0f;border-color:rgba(245,245,247,.13);box-shadow:none}
    .image-trigger{display:block;width:100%;padding:0;border:0;border-radius:11px;background:transparent;color:inherit;cursor:zoom-in}.media img{display:block;width:100%;height:auto;max-height:calc(100vh - 190px);object-fit:contain;border-radius:11px}
    .proof-strip{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin:0 0 12px}.validation-badge,.level-badge{display:inline-flex;align-items:center;min-height:28px;padding:6px 9px;border-radius:999px;border:1px solid rgba(105,112,125,.3);background:rgba(250,250,251,.94);color:var(--default);font:9px var(--mono);letter-spacing:.06em;text-transform:uppercase}
    .level-badge{background:transparent;color:var(--muted)}
    .validation-badge.validated{border-color:rgba(29,127,84,.26);background:rgba(244,255,249,.94);color:var(--pass)}
    .validation-badge.mixed,.validation-badge.external{border-color:rgba(150,102,20,.3);background:rgba(255,250,238,.95);color:var(--warn)}.validation-badge.unsupported{border-color:rgba(194,69,58,.3);background:rgba(255,245,244,.95);color:var(--fail)}
    .dark .validation-badge,.dark .level-badge{background:rgba(5,5,6,.88)}.dark .validation-badge.validated{border-color:rgba(85,184,128,.32);color:var(--local)}.dark .validation-badge.mixed,.dark .validation-badge.external{border-color:rgba(217,168,86,.38);color:var(--staging)}.dark .validation-badge.unsupported{border-color:rgba(201,106,94,.38);color:var(--unsupported)}
    .two-up{display:grid;grid-template-columns:1fr 1fr;gap:12px}.two-up img{height:clamp(260px,48vh,520px);object-fit:cover;object-position:top}
    .role-grid,.metric-grid,.legend-grid,.flow-grid{display:grid;gap:14px;margin-top:30px}
    .role-grid{grid-template-columns:repeat(3,1fr)}.metric-grid{grid-template-columns:repeat(4,1fr)}.legend-grid{grid-template-columns:repeat(3,1fr)}.flow-grid{grid-template-columns:repeat(7,1fr)}
    .card{border:1px solid var(--hair);background:var(--panel);border-radius:16px;padding:18px;text-align:left;color:var(--ink)}
    .dark .card{border-color:rgba(245,245,247,.11);background:#0b0c0f;color:#f5f5f7}
    .card strong{display:block;font-size:17px;margin-bottom:8px}.card span{display:block;color:var(--muted);font-size:13px;line-height:1.4}.dark .card span{color:rgba(245,245,247,.5)}
    .card .route{font:10px var(--mono);color:var(--blue);margin-top:12px}.dark .card .route{color:#9fc3e4}
    .actions,.role-progress{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:14px}
    .action-wrap{display:inline-flex;flex-direction:column;align-items:flex-start;gap:1px}.action-link,.role-progress button{display:inline-flex;align-items:center;justify-content:center;min-height:38px;border:1px solid var(--hair);border-radius:999px;padding:8px 13px;background:var(--panel);color:var(--ink);font:10px var(--mono);letter-spacing:.03em;text-decoration:none}
    .action-link.primary{background:var(--ink);border-color:var(--ink);color:#fff}.dark .action-link,.dark .role-progress button{background:#0b0c0f;border-color:rgba(245,245,247,.18);color:#f5f5f7}.dark .action-link.primary{background:#f5f5f7;color:#050506}
    .action-link:visited{border-color:rgba(116,92,199,.55)}
    .role-progress{border-top:1px solid var(--hair);padding-top:10px}.dark .role-progress{border-color:rgba(245,245,247,.1)}.role-progress span{font:10px var(--mono);color:var(--muted);margin-right:auto}.dark .role-progress span{color:rgba(245,245,247,.55)}
    .metric strong{font:28px var(--mono);letter-spacing:-.04em}.metric span{margin-top:8px}
    .legend-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:8px}.hollow{background:transparent!important;border:1.5px solid currentColor}
    .flow-card{text-align:center;position:relative;padding:16px 10px}.flow-card:not(:last-child)::after{content:"→";position:absolute;right:-13px;top:45%;color:var(--muted);font:18px var(--mono)}
    .flow-card strong{font:12px var(--mono);letter-spacing:.05em}.flow-card span{font-size:11px}
    .footer{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px;padding:0 24px;border-top:1px solid rgba(245,245,247,.1);background:#050506}
    .section-nav{display:flex;gap:7px;overflow:auto;scrollbar-width:none}.section-btn{font:10px var(--mono);white-space:nowrap;padding:7px 10px}.section-btn.active{background:#f5f5f7;color:#050506}
    .prev-next{display:flex;gap:8px}.footer .hint{justify-self:end;font:10px var(--mono);color:rgba(245,245,247,.38)}
    .drawer-scrim{position:fixed;inset:58px 0 54px;z-index:35;border:0;background:rgba(0,0,0,.56);opacity:0;pointer-events:none;transition:opacity .25s ease}.drawer-scrim.open{opacity:1;pointer-events:auto}
    .drawer{position:fixed;inset:58px auto 54px 0;width:min(430px,92vw);z-index:40;background:#08090b;border-right:1px solid rgba(245,245,247,.12);padding:24px;transform:translateX(-102%);transition:transform .25s ease;overflow:auto}.drawer.open{transform:none}
    .drawer-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}.drawer h2{font-size:25px;font-weight:400;letter-spacing:-.03em;margin:0 auto 0 0}.drawer .drawer-close{width:auto;margin:0;border:1px solid rgba(245,245,247,.16);border-radius:999px;text-align:center}
    .drawer button{display:block;width:100%;min-height:44px;text-align:left;margin:5px 0;border:0;background:transparent;color:rgba(245,245,247,.7);padding:10px 11px;border-radius:9px}.drawer button:hover,.drawer button[aria-current="true"]{background:#f5f5f7;color:#050506}
    .guide-search{display:grid;grid-template-columns:1fr 132px;gap:8px;margin-bottom:14px}.guide-search label{grid-column:1/-1;font:10px var(--mono);letter-spacing:.07em;color:rgba(245,245,247,.62)}.guide-search input,.guide-search select{width:100%;min-height:44px;padding:10px 12px;border:1px solid rgba(245,245,247,.2);border-radius:9px;background:#111318;color:#f5f5f7}.search-status,.completion-summary{margin:7px 0 12px;font:10px/1.45 var(--mono);color:rgba(245,245,247,.5)}.drawer-section-title{margin:18px 0 6px;font:9px var(--mono);letter-spacing:.16em;text-transform:uppercase;color:rgba(245,245,247,.4)}.search-result strong,.search-result span{display:block}.search-result strong{font-size:13px}.search-result span{margin-top:3px;font:9px/1.35 var(--mono);color:inherit;opacity:.7}.no-results{padding:14px 11px;color:rgba(245,245,247,.55);line-height:1.45}
    .platform-config{padding:14px;margin:0 0 18px;border:1px solid rgba(245,245,247,.14);border-radius:14px}.platform-config label{display:block;font:10px var(--mono);letter-spacing:.05em;color:rgba(245,245,247,.62)}.platform-config input{width:100%;min-height:44px;margin:9px 0 5px;padding:10px 12px;border:1px solid rgba(245,245,247,.2);border-radius:9px;background:#111318;color:#f5f5f7}.platform-config small{display:block;color:rgba(245,245,247,.48);line-height:1.4}.platform-config .config-error{color:#ef9a92;min-height:1.4em}.action-link.disabled{border-style:dashed;color:var(--muted);background:transparent}
    .modal{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.86);display:none;align-items:center;justify-content:center;padding:32px}.modal.open{display:flex}.modal img{max-width:96vw;max-height:92vh;object-fit:contain}.modal button{position:absolute;right:20px;top:20px}
    .status-row{display:flex;gap:9px;flex-wrap:wrap;margin-top:22px}.pill{border:1px solid var(--hair);border-radius:999px;padding:8px 11px;font:10px var(--mono);color:var(--muted)}.dark .pill{border-color:rgba(245,245,247,.14);color:rgba(245,245,247,.55)}
    @media(max-height:800px) and (min-width:981px){
      .slide{padding:12px clamp(30px,4.8vw,62px);gap:36px}
      .copy{justify-content:flex-start}
      .slide.no-image{padding-top:9px;padding-bottom:9px}
      .slide.no-image .copy{margin:0 auto}
      .eyebrow{margin-bottom:8px}
      h1{font-size:clamp(44px,5vw,60px)}h2{font-size:clamp(34px,3.5vw,48px)}
      .lede{font-size:clamp(15px,1.3vw,18px);line-height:1.35;margin-top:10px}
      .steps{gap:4px;margin-top:13px}
      .step{grid-template-columns:29px 1fr;gap:9px;padding:6px 0;font-size:14px;line-height:1.28}
      .step button{width:25px;height:25px}
      .expected{margin-top:10px;padding:9px 12px;font-size:13px;line-height:1.35}
      .evidence{margin-top:7px;font-size:9px}
      .proof-strip{margin-bottom:5px}.validation-badge,.level-badge{min-height:24px;padding:4px 7px;font-size:8px}
      .actions,.role-progress{margin-top:6px;gap:5px}.action-link,.role-progress button{min-height:29px;padding:5px 9px;font-size:8px}.role-progress{padding-top:5px}
      .role-grid,.metric-grid,.legend-grid,.flow-grid{gap:8px;margin-top:14px}
      .card{padding:11px;border-radius:12px}.card strong{font-size:14px;margin-bottom:4px}.card span{font-size:11px}.card .route{margin-top:6px}.metric strong{font-size:23px}.metric span{margin-top:4px}
      .role-grid{gap:6px}.role-grid .card{padding:8px}.role-grid .card .route{margin-top:2px;font-size:8px}
      .slide[data-id="roles"] .lede{margin-top:6px}
      .slide[data-id="roles"] h2{font-size:38px}
      .slide[data-id="roles"] .role-grid{margin-top:6px;grid-template-columns:repeat(3,1fr)}
      .slide[data-id="roles"] .expected{margin-top:5px;padding:6px 10px}
      .slide[data-id="roles"] .evidence{margin-top:4px}
      .flow-card{padding:11px 7px}
      .media img{max-height:calc(100vh - 160px)}
    }
    @media(max-width:980px){.slide{grid-template-columns:1fr;padding:38px 26px;gap:26px}.copy{justify-content:flex-start}.media{align-items:flex-start}.media img{max-height:none}.role-grid,.metric-grid,.legend-grid{grid-template-columns:repeat(2,1fr)}.flow-grid{grid-template-columns:repeat(2,1fr)}.flow-card::after{display:none}.footer .hint{display:none}.footer{grid-template-columns:auto 1fr}.section-nav{justify-content:flex-end}}
    @media(max-width:620px){.topbar{padding:0 12px;gap:10px}.wordmark small{display:none}.top-actions #fullBtn{display:none}.slide{padding:24px 18px 34px}.role-grid,.metric-grid,.legend-grid,.two-up{grid-template-columns:1fr}.deck{height:calc(100vh - 112px)}h1{font-size:42px}h2{font-size:34px}.lede{font-size:16px}.footer{padding:0 10px}.section-nav{display:none}.step{grid-template-columns:44px 1fr}.step button,.icon-btn,.nav-btn,.role-btn,.action-link,.role-progress button,.drawer button,.image-trigger{min-width:44px;min-height:44px}.prev-next{gap:12px}.guide-search{grid-template-columns:1fr}.guide-search label{grid-column:auto}.drawer{padding:18px}.evidence summary{min-height:44px}}
    @media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition:none!important}}
  </style>
</head>
<body>
  <a class="skip-link" href="#guideMain">Skip to the active guide slide</a>
  <div class="app">
    <header class="topbar">
      <div class="wordmark">ProofShape <small>PLATFORM GUIDE</small></div>
      <div class="progress-track" id="progressTrack" role="progressbar" aria-label="Slide progress" aria-valuemin="1" aria-valuemax="53" aria-valuenow="1" aria-valuetext="Slide 1 of 53"><div class="progress-bar" id="progress"></div></div>
      <div class="top-actions"><button class="icon-btn" id="menuBtn" aria-label="Open section menu" aria-expanded="false" aria-controls="drawer">Sections</button><span class="counter" id="counter" aria-live="polite"></span><button class="icon-btn" id="fullBtn" aria-label="Toggle fullscreen">Full screen</button></div>
    </header>
    <main id="guideMain" tabindex="-1"><h1 class="sr-only">ProofShape interactive platform guide</h1><div class="deck" id="deck" aria-label="ProofShape platform guide" aria-roledescription="slide deck"></div><p class="sr-only" id="slideStatus" role="status" aria-live="polite"></p></main>
    <footer class="footer">
      <div class="prev-next"><button class="nav-btn" id="prevBtn" aria-label="Previous slide">←</button><button class="nav-btn" id="nextBtn" aria-label="Next slide">→</button></div>
      <nav class="section-nav" id="sectionNav" aria-label="Use-case sections"></nav>
      <div class="hint">← → or swipe · / search · F full screen</div>
    </footer>
  </div>
  <button class="drawer-scrim" id="drawerScrim" type="button" aria-label="Close use-case finder" tabindex="-1"></button>
  <aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="drawerTitle" aria-hidden="true" inert><div class="drawer-head"><h2 id="drawerTitle">Find a use case</h2><button class="drawer-close" id="drawerClose" type="button" aria-label="Close use-case finder">Close</button></div><div class="guide-search"><label for="guideSearch">Search title, task, role, or golden-path ID</label><input id="guideSearch" type="search" autocomplete="off" placeholder="Try “RFQ” or “VER-05”" /><label class="sr-only" for="levelFilter">Learning level</label><select id="levelFilter"><option value="all">All levels</option><option value="onboarding">Onboarding</option><option value="basic">Basic use</option><option value="advanced">Advanced use</option><option value="boundary">Boundaries</option></select></div><p class="search-status" id="searchStatus" role="status" aria-live="polite"></p><p class="completion-summary" id="completionSummary"></p><form class="platform-config" id="platformConfig" novalidate><label for="platformBase">Platform URL</label><input id="platformBase" type="url" inputmode="url" autocomplete="url" placeholder="https://proofshape.company.test" /><small id="platformHint">Required when this guide is opened as a local file. Only http:// or https:// is accepted.</small><small class="config-error" id="platformError" role="alert"></small><button type="submit">Use this platform URL</button></form><div class="drawer-section-title">Sections</div><div id="drawerSections"></div><div class="drawer-section-title">Matching slides</div><div id="drawerLinks"></div></aside>
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="Expanded platform evidence" aria-hidden="true" inert><button class="icon-btn" id="closeModal">Close</button><img id="modalImage" alt="Expanded platform evidence" /></div>
  <script>
  const A="assets/";
  const safeOrigin=value=>{try{const url=new URL(value);return ["http:","https:"].includes(url.protocol)?url.origin:null}catch{return null}};

  const slides=[
    {id:"cover",section:"Start",dark:true,title:"ProofShape, from zero to a defensible result",kicker:"Interactive platform walkthrough",summary:"A role-based, step-by-step guide from account access through verified CAD, governed cost, manufacturing context, batch work, RFQ evidence, administration, and recovery.",image:"01-public-home.png",actions:[["Open the platform","/verify","app","primary"]],expected:"Use the arrows, section tabs, or role menu. Check off each action as you perform it; progress stays on this device.",evidence:"Production-candidate guide · browser-validated outcomes · updated 2026-07-13"},
    {id:"guarantee",section:"Start",dark:true,title:"A loaded screen is not proof that the work succeeded",kicker:"Evidence standard",summary:"A proven path reaches its visible, durable, numerical, downloadable, authorization, and recovery outcomes on one committed build.",metrics:[["64","locally executable paths"],["7","staging-only paths"],["10","required recoveries"],["EXACT","commit-bound gate"]],steps:["Perform the stated action as a user would.","Compare the result with the mapped golden-path result.","Stop if any identity, number, file, state, or recovery result differs."],expected:"LOCAL_GATE_PASS requires all 64 locally executable paths on the exact clean commit. Seven external paths still require real staging providers. Contract counts describe the gate; they never certify the build currently on screen.",evidence:"Current-build golden-path gate"},
    {id:"roles",section:"Start",title:"Choose the path that matches the work you need to finish",kicker:"Role-based navigation",summary:"Complete Access first, then choose a role. The guide will show Previous/Next in my role so you do not have to infer an itinerary.",roles:[["CAD engineer","Verify and investigate CAD","cad","7 guided stops"],["Design engineer","Create, revise, and archive","design","7 guided stops"],["Cost engineer","Cost, govern, compare, share","cost","9 guided stops"],["Manufacturing lead","Machines, DFM, truth, triage","manufacturing","8 guided stops"],["Sourcing lead","Records, compare, RFQ bundle","sourcing","7 guided stops"],["Administrator","Access, roles, keys, providers","admin","9 guided stops"],["Viewer / auditor","Read evidence; prove boundaries","auditor","5 guided stops"],["Public evaluator","Assess method before an account","public","4 guided stops"]],expected:"Choose a role; then use Next in my role until the itinerary says complete. On a PARTIAL slide, stop at the named external boundary.",evidence:"Role itineraries mapped to canonical browser paths and explicit provider boundaries"},
    {id:"lifecycle",section:"Start",title:"One part becomes one traceable decision chain",kicker:"The governing object model",summary:"ProofShape does not stop at a mesh or a price. Every useful result travels through a visible evidence chain.",flow:[["CAD","file + hash"],["Geometry","measured"],["Routing","process fit"],["DFM","findings"],["Cost","drivers"],["Decision","approved state"],["Record","export + history"]],expected:"If an upstream stage fails, downstream stages are withheld. A blank or withheld value is never silently treated as zero.",evidence:"Verify pipeline, decision persistence, export, and history browser journeys"},
    {id:"trust",section:"Start",title:"Read the dots before you trust the number",kicker:"Provenance legend",summary:"Color identifies where a value came from. Filled dots are grounded; hollow dots are assumptions or model output.",legend:[["#3772ab","● MEASURED","read from CAD geometry"],["#a06030","● SHOP","bound to a governed shop rate"],["#745cc7","● USER","declared by a person"],["#a12d86","● CAD","read from CAD annotation"],["#69707d","○ DEFAULT","generic fallback"],["#69707d","○ MODEL","computed from assumptions"]],steps:["Prefer MEASURED, SHOP, USER, or CAD values for decisions.","Open drivers when DEFAULT or MODEL appears.","Treat a hatched confidence band as assumption-based, not validated."],expected:"Every cost, dimension, quantity, rate, source, and identifier keeps its provenance label.",evidence:"Accessibility token tests + enterprise methodology-fidelity gate"},
    {id:"before",section:"Start",title:"Download the controlled practice files before the first upload",kicker:"Zero-step checklist",summary:"Start with controlled fixtures so you can separate platform behavior from the condition of an unknown customer file.",actions:[["Download golden cube.step","cube-step","fixture","primary"],["Download machine import CSV","machine-csv","fixture"],["Download one-part batch ZIP","batch-zip","fixture"],["Read every fixture outcome","fixtures/README.md","asset"]],steps:["Set the platform URL in Sections if a platform action asks for it.","Download the fixtures without renaming or editing them.","Use cube.step in Verify and Should-cost, the CSV in Your machines, and the ZIP in Batch."],expected:"The golden STEP SHA-256 is 76923244d66efcbf1eb1639a26a6b4b6bd20fd73eaf44ad1b95268dddf61103a. The deck validator downloads, parses, and re-hashes every linked fixture before this guide passes.",evidence:"Controlled fixture integrity"},

    {id:"access",section:"Access",validation:"partial",dark:true,title:"Use the access method the screen actually offers",kicker:"First access decision",summary:"Password and invitation paths are locally executable. Production email-link and enterprise SSO acceptance require their real staging providers.",image:"02-login.png",actions:[["Open sign in","/login","app","primary"],["Open sign up","/signup","app"]],steps:["For local password access, sign up only when the screen offers it; use at least eight characters.","For an invitation, authenticate as the exact invited email before redeeming the token.","For production email-link access, use the delivered single-use link and prove replay or expiry fails in staging.","For enterprise SSO, use the approved IdP test tenant and prove audience, group, replay, and logout behavior."],expected:"The local password path lands on /verify and shows DAY ZERO SETUP; weak or wrong credentials create no session. Email delivery and SSO remain staging-required until AUTH-06 and IDP-01 pass against real providers.",evidence:"Authentication and invitation browser matrices"},
    {id:"access-modes",section:"Access",validation:"partial",title:"Know which access branches are local and which require staging",kicker:"Password · email link · SSO",summary:"A simulator can prove application handling, but it cannot prove production email delivery or a customer identity provider.",steps:["Password: sign in, open the requested safe local path, then sign out.","Email link: request, deliver, consume once, remove the token from the URL, then prove replay and expiry fail in staging.","SSO: complete the approved SAML test-tenant policy, verify the mapped role, then prove replay and invalid audience fail.","After every branch, revisit a protected route and confirm the login boundary returns."],expected:"Password and protected-route behavior are locally proven. Production magic-link delivery is AUTH-06 and enterprise SSO is IDP-01; both stay open until external staging acceptance completes.",evidence:"Canonical authentication matrix"},
    {id:"invite-accept",section:"Access",validation:"validated",title:"An organization invitation belongs only to the invited identity",kicker:"Invitation lifecycle",summary:"The token does not replace authentication. Sign in as the exact invited email, then redeem it once.",actions:[["Open organization settings","/settings/organization","app","primary"]],steps:["As an organization admin, enter the recipient’s permanent email and least-privileged role; select Send invite.","Open the acceptance URL in a separate browser.","Authenticate as the exact invited email, then redeem the invitation once.","Prove a second redemption, wrong identity, expired link, or revoked invite cannot grant access."],expected:"One membership is created for the invited identity at the intended role. Invalid or replayed tokens change nothing, and the role lifecycle remains auditable.",evidence:"Invitation and role lifecycle browser matrix"},
    {id:"session-security",section:"Access",validation:"validated",title:"Finish account setup, then prove the session can end",kicker:"Password and session hygiene",summary:"Email-link users may initialize a password once when the configured auth mode allows it. Every user must be able to sign out cleanly.",actions:[["Open Security","/settings/security","app","primary"]],steps:["Open Security and read the configured auth mode.","If Initial password is available, enter matching values that meet the displayed policy and submit once.","Sign out from the account menu; use Back and refresh on a protected route.","Sign in again through the approved method and confirm the intended tenant—not another recent tenant—opens."],expected:"Password initialization never weakens email-link recovery; sign-out removes the session, protected pages stay protected after Back/refresh, and a new login restores only authorized tenant state.",evidence:"AUTH-02/05/07/08 · session boundary and password initialization"},
    {id:"day-zero",section:"Access",validation:"validated",title:"Day Zero tells you what is real—and what is empty",kicker:"First authenticated screen",summary:"A new organization starts with no seeded machines, records, actuals, or program context.",image:"03-day-zero.png",steps:["Read the four setup steps.","Select Verify when you need the first useful result now.","Return later to Your machines, Programs, and Calibration & truth to ground the economics."],expected:"All counters start at zero. Opening or revisiting a section does not invent or mutate tenant data.",evidence:"VER-01/02 · public/auth golden matrix"},
    {id:"navigation",section:"Access",validation:"validated",title:"Use the rail for domains; use Jump for intent",kicker:"Navigation that scales",summary:"Desktop, mobile selector, command palette, back/forward, refresh, and restart journeys preserve the user’s place and record identity.",image:"04-command-palette.png",steps:["Use the left rail to open Verify, Design Studio, Cost decisions, Analyze DFM, or Batch.","Open Jump or press ⌘K / Ctrl+K.","Type triage and press Enter.","Use browser Back and Forward; confirm the same record remains selected."],expected:"The requested surface opens, focus remains usable, and navigation never substitutes a different tenant, design, revision, or decision.",evidence:"AUTH-07/08 · VER-09 · mobile responsive-loop oracle"},
    {id:"notifications",section:"Access",validation:"validated",title:"Notifications are durable work state—not decorative toast",kicker:"Read, refresh, and return",summary:"Unread state and notification destinations must survive refresh.",image:"05-notifications.png",actions:[["Open Notifications","/notifications","app","primary"]],steps:["Open Notifications and select a durable row by its accessible title.","Return to the inbox and mark that row read.","Choose Mark all read, then refresh.","Confirm the unread state survives refresh and the destination remains understandable."],expected:"The inbox shows durable rows or “You’re all caught up.” Unread status reaches zero and survives refresh.",evidence:"Notification read-state browser matrix"},
    {id:"public-evaluator",section:"Access",validation:"validated",title:"Evaluate the method and boundaries before creating an account",kicker:"Public evaluator path",summary:"The public site explains the platform, method, security posture, team use cases, API boundary, and bounded pilot intake without exposing tenant data.",actions:[["Read the method","/method","app","primary"],["See the platform","/platform","app"],["Review security","/security","app"],["Open developer docs","/developers","app"],["Request a pilot","/company#pilot","app"]],steps:["Open each public page in a private browser with no ProofShape session; confirm its route-specific heading and the same ProofShape identity.","Repeat public navigation at 390 px and confirm every call to action remains reachable without horizontal overflow.","Open a protected route and confirm it redirects to login without flashing tenant content.","Submit one valid pilot request and retain its bounded acknowledgement; the form must not ask for CAD or quote data.","Omit required fields, exercise the neutral bot path, and repeat the same valid request; confirm no user-enumeration detail or second receipt appears."],expected:"PUB-01 and PUB-02 prove the public routes and mobile navigation; AUTH-01 proves the protected boundary. PUB-03 creates one durable receipt UUID, while PUB-04 reuses that receipt for a duplicate and creates no second row.",evidence:"Public, pilot-intake, and signed-out browser matrices"},

    {id:"verify-upload",section:"Verify CAD",validation:"validated",title:"Drop one real CAD file and wait for a terminal result",kicker:"Use case · verify existing CAD",summary:"The Verify workspace runs geometry, routing, DFM, and should-cost against the same uploaded bytes.",image:"06-verify-result.png",actions:[["Open Verify","/verify","app","primary"],["Download golden cube.step","cube-step","fixture"]],steps:["Open Verify workspace and select Verify in the internal rail.","Drop or choose cube.step.","Refresh or navigate away once while verification runs, then return to the selected result.","Wait until geometry, routing, DFM, and cost reach a terminal state."],expected:"The golden file completes without the busy or tessellation recovery states, resumes by exact selected identity, and creates durable analysis and decision evidence.",evidence:"Golden Verify and resume browser matrix"},
    {id:"verify-read",section:"Verify CAD",validation:"validated",title:"Confirm geometry before reading the recommendation",kicker:"Result sanity check",summary:"A plausible recommendation on the wrong geometry is still wrong. Verify the measured facts first.",steps:["Confirm the full SHA-256 is 76923244d66efcbf1eb1639a26a6b4b6bd20fd73eaf44ad1b95268dddf61103a.","Confirm the envelope is 20 × 15 × 10 mm within 0.1 mm.","Confirm volume is 2717.3 mm³ ±1 and area is 1432 mm² ±2.","Confirm watertight is true; then inspect the quantity ladder and provenance before acting."],expected:"The live result and reopened record retain the exact source SHA-256 and VER-05 geometry. Quantity changes follow VER-06; prices remain visibly model- or assumption-derived unless governed inputs replace them.",evidence:"Pinned Verify and quantity browser oracles"},

    {id:"decision-stale",section:"Cost & Governance",validation:"validated",title:"A new governed rate makes the old decision visibly stale",kicker:"Re-cost trigger",summary:"Stale is protective: it stops a prior approval from looking current after its rate basis changes.",image:"16-decision-stale.png",actions:[["Open Cost decisions","/cost-decisions","app","primary"]],steps:["Publish a new governed rate-card version as an administrator.","Return to the previously saved decision.","Read the stale warning and reason.","Re-run cost before relying on or packaging the decision."],expected:"The decision shows Stale and “Re-cost before relying on this record,” with reason rate_library_published.",evidence:"Governed-rate stale transition browser matrix"},
    {id:"compare-ab",section:"Cost & Governance",validation:"validated",title:"Compare A/B only after both decisions are durable",kicker:"Cost comparison",summary:"Comparison reads two saved records; it does not quietly recalculate them.",actions:[["Open Compare A/B","/cost-decisions/compare","app","primary"]],steps:["Open Compare A/B.","Select two durable decisions by filename and identity.","Read each aligned quantity row, process, approval, and stale flag.","Refresh and confirm the exact comparison reopens."],expected:"Delta equals B − A to $0.01, percent is shown to 0.1%, and percent is null when either source value is absent. Source order and governance state survive reload.",evidence:"Cost comparison browser matrix"},

    {id:"public-share",section:"Cost & Governance",validation:"validated",title:"A public share is read-only, minimal, and revocable",kicker:"Controlled external review",summary:"Share only the reviewed should-cost view. The public payload must redact private IDs and hashes.",actions:[["Open Cost decisions","/cost-decisions","app","primary"]],steps:["Open a reviewed cost decision, choose Share, and copy the public URL.","Open it in a private browser with no ProofShape session.","Confirm the share is read-only and redacts internal IDs and hashes.","Return as owner, revoke the share, then refresh the public URL."],expected:"The share equals saved evidence while remaining read-only and redacted. After revocation the public URL is unavailable, while the owner record persists.",evidence:"Public-share privacy and revoke browser matrix"},

    {id:"machine-floor",section:"Manufacturing",validation:"validated",title:"Publish the governed rates the organization actually uses",kicker:"Use case · manufacturing lead",summary:"Owned capability and governed hourly rates must be authored and published before they can ground cost evidence.",image:"17-machine-floor.png",actions:[["Open Your machines","/verify?screen=machines","app","primary"]],steps:["Open Your machines and review the current authored capability floor.","Set MJF to $48/hr and CNC 3-axis to $95/hr.","Set CNC 5-axis to $142/hr and DMLS to $185/hr.","Publish the governed rate card, then reopen it and inspect each USER provenance label."],expected:"The four governed rates remain MJF $48/hr, CNC 3-axis $95/hr, CNC 5-axis $142/hr, and DMLS $185/hr; authored and published state is visible.",evidence:"Governed-rate and machine-floor browser matrix"},

    {id:"severe-service",section:"Manufacturing",validation:"validated",title:"Severe service rejects unsafe materials before recovering a route",kicker:"120 °C · sour service · 35 MPa",summary:"Complex service constraints must change feasibility—not merely decorate the record.",actions:[["Open Verify","/verify","app","primary"],["Download golden cube.step","cube-step","fixture"]],steps:["In Verify select Polymer, 120 °C service, sour service, and 35 MPa pressure; upload the golden STEP.","Read every returned environment exclusion and its standards citation.","Confirm the surviving PEEK capability is makeable_not_on_owned on the declared inventory.","Select Stainless without re-uploading and confirm makeable_in_house."],expected:"Unsafe polymer routes are excluded with visible standards-cited reasons. PEEK remains an owned-capability gap; Stainless recovers to makeable_in_house and the USER service context persists.",evidence:"Severe-service browser matrix"},
    {id:"programs",section:"Manufacturing",validation:"validated",title:"Program exposure appears only after exact-volume verification",kicker:"Program and annual economics",summary:"ProofShape withholds annualized exposure until the engine has a recommendation at the declared quantity.",image:"20-program-exposure.png",actions:[["Open Programs","/verify?screen=programs","app","primary"]],steps:["Assign the verified part to a program and parent assembly.","Declare the exact annual volume of 12,000 units.","Re-verify at that exact quantity before accepting annualized exposure.","Open Programs and compare the part, annual volume, exposure, and source decision."],expected:"The exact-volume recommendation is $10.08/unit and $120,960/year. The $133.58 single-part headline is never multiplied by annual volume, and rows without exact-volume evidence remain withheld.",evidence:"Exact-volume exposure browser matrix"},

    {id:"batch",section:"Batch & Sourcing",validation:"validated",title:"A ZIP batch must finish before its CSV becomes evidence",kicker:"Use case · many parts",summary:"Batch creation, durable progress, item identity, cancellation, and CSV reconciliation are separate checks.",image:"27-batch.png",actions:[["Open Batch","/batch","app","primary"],["Download one-part batch ZIP","batch-zip","fixture"]],steps:["Open Batch, select the controlled ZIP, and choose Start batch once.","Refresh the durable batch ID while work is running.","Wait until completed + failed + skipped equals total.","Download CSV and reconcile one row per item with the item cards."],expected:"The parent and every child settle durably. CSV headers and each item’s filename, status, result URL, and error agree with the batch detail view.",evidence:"Durable batch and CSV browser matrix"},
    {id:"batch-recovery",section:"Batch & Sourcing",validation:"validated",title:"A queue or service fault must not strand or duplicate the batch",kicker:"Queue and service recovery",summary:"A failed queue submission and a degraded dependency must produce an honest retry state, not a false success.",image:"27-batch.png",actions:[["Open Batch","/batch","app","primary"]],steps:["Keep the original batch ID when queue or service health fails.","Read the failure and retry guidance; do not submit a second blind copy.","Restore service health, then use the stated retry once.","Refresh the original object and reconcile its terminal child states."],expected:"A queue failure marks the accepted batch failed with retry copy. Recovery creates one durable batch without duplicate item processing, and degraded services never leave success-looking orphan rows.",evidence:"Batch queue and degraded-service recovery matrix"},
    {id:"batch-cancel",section:"Batch & Sourcing",validation:"validated",title:"Cancel the original batch; do not create a second one to escape it",kicker:"Cancellation invariant",summary:"Cancellation preserves completed work and settles pending work on the same durable batch.",actions:[["Open Batch","/batch","app","primary"],["Download one-part batch ZIP","batch-zip","fixture"]],steps:["Start the controlled batch ZIP and note its durable batch ID.","While work remains pending, choose Cancel and confirm once.","Refresh that same batch ID and inspect every item state.","Confirm completed work remains and pending work becomes skipped."],expected:"Completed + failed + skipped equals total. Cancellation preserves completed work, skips pending work, and the cancelled parent never later presents a false completed state.",evidence:"Batch cancellation browser matrix"},
