<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>ProofShape — zero-to-confident platform guide</title>
  <style>
    :root {
      --bg:#f6f6f7; --panel:#fff; --hair:#e2e2e6; --ink:#17181a;
      --muted:rgba(23,24,26,.66); --blue:#3772ab; --shop:#a06030;
      --user:#745cc7; --default:#69707d; --pass:#1d7f54;
      --warn:#966614; --fail:#c2453a; --shadow:0 24px 80px rgba(20,28,42,.14);
      --sans:"Helvetica Neue",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
      --mono:ui-monospace,"SF Mono","SFMono-Regular",Menlo,monospace;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#050506;color:#f5f5f7;font-family:var(--sans)}
    button,input{font:inherit}
    button{cursor:pointer}
    .app{min-height:100vh;display:grid;grid-template-rows:58px 1fr 54px;background:#050506}
    .topbar{position:sticky;top:0;z-index:20;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:24px;padding:0 24px;border-bottom:1px solid rgba(245,245,247,.1);background:rgba(5,5,6,.94);backdrop-filter:blur(18px)}
    .wordmark{font-weight:600;letter-spacing:-.03em}.wordmark small{font:10px var(--mono);letter-spacing:.15em;color:rgba(245,245,247,.45);margin-left:10px}
    .progress-track{height:2px;background:rgba(245,245,247,.09);position:relative}.progress-bar{height:100%;background:#9fc3e4;transition:width .35s ease}
    .top-actions{display:flex;align-items:center;gap:8px}
    .icon-btn,.nav-btn,.section-btn,.role-btn,.check-btn{border:1px solid rgba(245,245,247,.16);background:transparent;color:#f5f5f7;border-radius:999px;padding:8px 13px}
    .icon-btn:hover,.nav-btn:hover,.section-btn:hover,.role-btn:hover{background:#f5f5f7;color:#050506}
    .counter{font:11px var(--mono);color:rgba(245,245,247,.6);min-width:56px;text-align:center}
    main{position:relative;min-height:0;overflow:hidden}
    .deck{height:calc(100vh - 112px);position:relative}
    .slide{position:absolute;inset:0;display:grid;grid-template-columns:minmax(340px,.86fr) minmax(520px,1.35fr);gap:46px;padding:54px clamp(34px,6vw,94px);opacity:0;pointer-events:none;transform:translateX(30px);transition:opacity .32s ease,transform .32s ease;background:var(--bg);color:var(--ink);overflow:auto}
    .slide.active{opacity:1;pointer-events:auto;transform:none}
    .slide.dark{background:#050506;color:#f5f5f7}
    .slide.no-image{grid-template-columns:1fr}.slide.no-image .copy{max-width:1060px;margin:auto;width:100%}
    .copy{display:flex;flex-direction:column;justify-content:center;min-width:0}
    .eyebrow{margin:0 0 16px;font:11px var(--mono);letter-spacing:.22em;text-transform:uppercase;color:var(--blue)}
    .dark .eyebrow{color:#9fc3e4}
    h1,h2{margin:0;font-weight:350;letter-spacing:-.045em;line-height:1.02}
    h1{font-size:clamp(46px,6.2vw,88px)}h2{font-size:clamp(38px,4.3vw,64px)}
    .lede{font-size:clamp(17px,1.55vw,23px);line-height:1.46;color:var(--muted);max-width:760px;margin:22px 0 0}
    .dark .lede{color:rgba(245,245,247,.62)}
    .steps{display:grid;gap:10px;margin:28px 0 0;padding:0;list-style:none}
    .step{display:grid;grid-template-columns:34px 1fr;gap:12px;align-items:start;padding:12px 0;border-top:1px solid var(--hair);font-size:16px;line-height:1.4}
    .dark .step{border-color:rgba(245,245,247,.1)}
    .step button{width:28px;height:28px;border:1px solid var(--hair);border-radius:7px;background:var(--panel);color:var(--ink);font:12px var(--mono)}
    .dark .step button{border-color:rgba(245,245,247,.18);background:#0b0c0f;color:#f5f5f7}
    .step.done button{background:var(--pass);border-color:var(--pass);color:#fff}.step.done .step-text{text-decoration:line-through;color:var(--muted)}
    .expected{margin-top:20px;padding:15px 17px;border-left:3px solid var(--pass);background:rgba(29,127,84,.07);font-size:15px;line-height:1.45}
    .dark .expected{background:rgba(85,184,128,.08)}
    .evidence{margin-top:14px;font:10px/1.45 var(--mono);letter-spacing:.04em;color:var(--muted)}
    .dark .evidence{color:rgba(245,245,247,.42)}
    .media{position:relative;display:flex;align-items:center;justify-content:center;min-width:0}
    .media-frame{position:relative;width:100%;max-height:100%;border:1px solid var(--hair);border-radius:18px;background:var(--panel);padding:10px;box-shadow:var(--shadow);overflow:hidden}
    .dark .media-frame{background:#0b0c0f;border-color:rgba(245,245,247,.13);box-shadow:none}
    .media img{display:block;width:100%;height:auto;max-height:calc(100vh - 190px);object-fit:contain;border-radius:11px;cursor:zoom-in}
    .validation-badge{position:absolute;right:18px;top:18px;z-index:2;padding:7px 10px;border-radius:999px;border:1px solid rgba(105,112,125,.3);background:rgba(250,250,251,.94);color:var(--default);font:10px var(--mono);letter-spacing:.06em}
    .validation-badge.validated{border-color:rgba(29,127,84,.26);background:rgba(244,255,249,.94);color:var(--pass)}
    .validation-badge.partial{border-color:rgba(150,102,20,.3);background:rgba(255,250,238,.95);color:var(--warn)}
    .dark .validation-badge{background:rgba(5,5,6,.88)}.dark .validation-badge.validated{border-color:rgba(85,184,128,.32);color:#55b880}.dark .validation-badge.partial{border-color:rgba(221,171,75,.38);color:#ddab4b}
    .two-up{display:grid;grid-template-columns:1fr 1fr;gap:12px}.two-up img{height:clamp(260px,48vh,520px);object-fit:cover;object-position:top}
    .role-grid,.metric-grid,.legend-grid,.flow-grid{display:grid;gap:14px;margin-top:30px}
    .role-grid{grid-template-columns:repeat(3,1fr)}.metric-grid{grid-template-columns:repeat(4,1fr)}.legend-grid{grid-template-columns:repeat(3,1fr)}.flow-grid{grid-template-columns:repeat(7,1fr)}
    .card{border:1px solid var(--hair);background:var(--panel);border-radius:16px;padding:18px;text-align:left;color:var(--ink)}
    .dark .card{border-color:rgba(245,245,247,.11);background:#0b0c0f;color:#f5f5f7}
    .card strong{display:block;font-size:17px;margin-bottom:8px}.card span{display:block;color:var(--muted);font-size:13px;line-height:1.4}.dark .card span{color:rgba(245,245,247,.5)}
    .card .route{font:10px var(--mono);color:var(--blue);margin-top:12px}.dark .card .route{color:#9fc3e4}
    .metric strong{font:28px var(--mono);letter-spacing:-.04em}.metric span{margin-top:8px}
    .legend-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:8px}.hollow{background:transparent!important;border:1.5px solid currentColor}
    .flow-card{text-align:center;position:relative;padding:16px 10px}.flow-card:not(:last-child)::after{content:"→";position:absolute;right:-13px;top:45%;color:var(--muted);font:18px var(--mono)}
    .flow-card strong{font:12px var(--mono);letter-spacing:.05em}.flow-card span{font-size:11px}
    .footer{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px;padding:0 24px;border-top:1px solid rgba(245,245,247,.1);background:#050506}
    .section-nav{display:flex;gap:7px;overflow:auto;scrollbar-width:none}.section-btn{font:10px var(--mono);white-space:nowrap;padding:7px 10px}.section-btn.active{background:#f5f5f7;color:#050506}
    .prev-next{display:flex;gap:8px}.footer .hint{justify-self:end;font:10px var(--mono);color:rgba(245,245,247,.38)}
    .drawer{position:fixed;inset:58px auto 54px 0;width:min(380px,88vw);z-index:40;background:#08090b;border-right:1px solid rgba(245,245,247,.12);padding:26px;transform:translateX(-102%);transition:transform .25s ease;overflow:auto}.drawer.open{transform:none}
    .drawer h3{font-size:25px;font-weight:400;margin:0 0 18px}.drawer button{display:block;width:100%;text-align:left;margin:7px 0;border:0;background:transparent;color:rgba(245,245,247,.65);padding:11px;border-radius:9px}.drawer button:hover{background:#f5f5f7;color:#050506}
    .modal{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.86);display:none;align-items:center;justify-content:center;padding:32px}.modal.open{display:flex}.modal img{max-width:96vw;max-height:92vh;object-fit:contain}.modal button{position:absolute;right:20px;top:20px}
    .status-row{display:flex;gap:9px;flex-wrap:wrap;margin-top:22px}.pill{border:1px solid var(--hair);border-radius:999px;padding:8px 11px;font:10px var(--mono);color:var(--muted)}.dark .pill{border-color:rgba(245,245,247,.14);color:rgba(245,245,247,.55)}
    @media(max-height:800px) and (min-width:981px){
      .slide{padding:12px clamp(30px,4.8vw,62px);gap:36px}
      .copy{justify-content:flex-start}
      .slide.no-image{padding-top:9px;padding-bottom:9px}
      .slide.no-image .copy{margin:0 auto}
      .eyebrow{margin-bottom:8px}
      h1{font-size:clamp(44px,5vw,60px)}h2{font-size:clamp(34px,3.5vw,48px)}
      .lede{font-size:clamp(15px,1.3vw,18px);line-height:1.35;margin-top:10px}
      .steps{gap:4px;margin-top:13px}
      .step{grid-template-columns:29px 1fr;gap:9px;padding:6px 0;font-size:14px;line-height:1.28}
      .step button{width:25px;height:25px}
      .expected{margin-top:10px;padding:9px 12px;font-size:13px;line-height:1.35}
      .evidence{margin-top:7px;font-size:9px}
      .role-grid,.metric-grid,.legend-grid,.flow-grid{gap:8px;margin-top:14px}
      .card{padding:11px;border-radius:12px}.card strong{font-size:14px;margin-bottom:4px}.card span{font-size:11px}.card .route{margin-top:6px}.metric strong{font-size:23px}.metric span{margin-top:4px}
      .role-grid{gap:6px}.role-grid .card{padding:8px}.role-grid .card .route{margin-top:2px;font-size:8px}
      .slide[data-id="roles"] .lede{margin-top:6px}
      .slide[data-id="roles"] h2{font-size:38px}
      .slide[data-id="roles"] .role-grid{margin-top:6px;grid-template-columns:repeat(3,1fr)}
      .slide[data-id="roles"] .expected{margin-top:5px;padding:6px 10px}
      .slide[data-id="roles"] .evidence{margin-top:4px}
      .flow-card{padding:11px 7px}
      .media img{max-height:calc(100vh - 160px)}
    }
    @media(max-width:980px){.slide{grid-template-columns:1fr;padding:38px 26px;gap:26px}.copy{justify-content:flex-start}.media{align-items:flex-start}.media img{max-height:none}.role-grid,.metric-grid,.legend-grid{grid-template-columns:repeat(2,1fr)}.flow-grid{grid-template-columns:repeat(2,1fr)}.flow-card::after{display:none}.footer .hint{display:none}.footer{grid-template-columns:auto 1fr}.section-nav{justify-content:flex-end}}
    @media(max-width:620px){.topbar{padding:0 12px;gap:10px}.wordmark small{display:none}.top-actions .icon-btn:nth-child(2){display:none}.slide{padding:28px 18px}.role-grid,.metric-grid,.legend-grid,.two-up{grid-template-columns:1fr}.deck{height:calc(100vh - 112px)}h1{font-size:44px}h2{font-size:38px}.lede{font-size:17px}.footer{padding:0 10px}.section-nav{display:none}}
    @media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition:none!important}}
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="wordmark">ProofShape <small>PLATFORM GUIDE</small></div>
      <div class="progress-track"><div class="progress-bar" id="progress"></div></div>
      <div class="top-actions"><button class="icon-btn" id="menuBtn" aria-label="Open section menu">Sections</button><span class="counter" id="counter"></span><button class="icon-btn" id="fullBtn" aria-label="Toggle fullscreen">Full screen</button></div>
    </header>
    <main><div class="deck" id="deck"></div></main>
    <footer class="footer">
      <div class="prev-next"><button class="nav-btn" id="prevBtn" aria-label="Previous slide">←</button><button class="nav-btn" id="nextBtn" aria-label="Next slide">→</button></div>
      <nav class="section-nav" id="sectionNav" aria-label="Use-case sections"></nav>
      <div class="hint">← → navigate · F full screen · click images to zoom</div>
    </footer>
  </div>
  <aside class="drawer" id="drawer"><h3>Jump to a use case</h3><div id="drawerLinks"></div></aside>
  <div class="modal" id="modal" role="dialog" aria-modal="true"><button class="icon-btn" id="closeModal">Close</button><img id="modalImage" alt="Expanded platform evidence" /></div>
  <script>
  const A="assets/";
  const slides=[
    {id:"cover",section:"Start",dark:true,title:"ProofShape, from zero to confident",kicker:"Interactive platform walkthrough",summary:"A step-by-step guide for engineers, cost teams, manufacturing leaders, sourcing teams, and administrators. Each workflow names the evidence actually exercised; unproven and external paths remain release gates.",image:"01-public-home.png",expected:"Use the arrows, section tabs, or role menu. Check off each action as you perform it; progress stays on this device.",evidence:"Validation evidence · independent re-audit · updated 2026-07-13"},
    {id:"guarantee",section:"Start",dark:true,title:"Completed behavior is evidence—not a screen that merely loaded",kicker:"What the validation badge means",summary:"A validated path must reach its expected visible, durable, numerical, downloadable, authorization, and recovery outcomes. Route coverage or matching test names alone cannot earn a release badge.",metrics:[["5/5","guide workflows completed"],["31","deck paths inspected"],["0","deck browser errors"],["OPEN","expanded release audit"]],steps:["Follow only the steps shown on each slide.","Compare the result to the expected-outcome box and its stated evidence scope.","If a result differs, stop and use the recovery slide—do not keep clicking."],expected:"The validated onboarding-to-RFQ subset works locally. The full product is not yet certified LOCAL_100 or publicly deployed; missing golden-path evidence and real-provider/legal boundaries remain gates.",evidence:"training-guide-e2e + deck-ui-e2e + independent outcome-oracle audit"},
    {id:"roles",section:"Start",title:"Choose the path that matches the work you need to finish",kicker:"Role-based navigation",summary:"Start with access, then choose a role. Each destination is labeled VALIDATED or PARTIAL.",roles:[["CAD engineer","Verify existing CAD","verify-upload"],["Design engineer","Create and revise safe CAD","design-guardrails"],["Cost engineer","Review and govern should-cost","cost-workspace"],["Manufacturing lead","Declare machines and truth","machine-floor"],["Sourcing lead","Generate an RFQ evidence bundle","rfq"],["Administrator","Manage keys, roles, and integrations","developer"]],expected:"Choose a role; stop at any PARTIAL slide's remaining gate.",evidence:"Golden-path matrix + independent outcome audit"},
    {id:"lifecycle",section:"Start",title:"One part becomes one traceable decision chain",kicker:"The governing object model",summary:"ProofShape does not stop at a mesh or a price. Every useful result travels through a visible evidence chain.",flow:[["CAD","file + hash"],["Geometry","measured"],["Routing","process fit"],["DFM","findings"],["Cost","drivers"],["Decision","approved state"],["Record","export + history"]],expected:"If an upstream stage fails, downstream stages are withheld. A blank or withheld value is never silently treated as zero.",evidence:"Verify pipeline, decision persistence, and history browser journeys"},
    {id:"trust",section:"Start",title:"Read the dots before you trust the number",kicker:"Provenance legend",summary:"Color identifies where a value came from. Filled dots are grounded. Hollow dots are assumptions or model output.",legend:[["#3772ab","● MEASURED","read from CAD geometry"],["#a06030","● SHOP","bound to your governed shop rate"],["#745cc7","● USER","declared by a person"],["#a12d86","● CAD","read from CAD annotation"],["#69707d","○ DEFAULT","generic fallback"],["#69707d","○ MODEL","computed from assumptions"]],steps:["Prefer MEASURED, SHOP, USER, or CAD values for decisions.","Open drivers when DEFAULT or MODEL appears.","Treat a hatched confidence band as assumption-based, not validated."],expected:"Every cost, dimension, quantity, rate, source, and identifier keeps its provenance label.",evidence:"WCAG token tests + enterprise methodology-fidelity gate"},
    {id:"before",section:"Start",title:"Prepare three things before the first upload",kicker:"Zero-step checklist",summary:"A clean start prevents most avoidable failures.",steps:["Get the ProofShape URL from your administrator. This guide was validated at the local production URL.","Use a permanent email and a password with at least 8 characters, one letter, and one number.","Prepare STL, STEP, STP, IGES, or IGS CAD. For this guide, use backend/tests/assets/cube.step."],expected:"The golden STEP is 19,030 bytes with SHA-256 76923244…61103a. Do not upload quote sheets into the CAD control.",evidence:"AUTH-04 · VER-05 · INPUT-INTEGRITY-001"},
    {id:"access",section:"Access",validation:"validated",dark:true,title:"Create the account, then land in the workspace",kicker:"First access",summary:"The validated build uses email and password. Your deployed environment may replace this with its approved identity method.",image:"02-login.png",steps:["Open /signup.","Enter your email.","Enter a password that meets the displayed policy.","Select Create account."],expected:"The browser lands on /verify and shows DAY ZERO SETUP. A weak password is rejected before an account is created.",evidence:"Human journey 21–23 · training guide step 1"},
    {id:"day-zero",section:"Access",validation:"validated",title:"Day Zero tells you what is real—and what is still empty",kicker:"First authenticated screen",summary:"A new organization starts with no seeded machines, records, actuals, or program context.",image:"03-day-zero.png",steps:["Read the four setup steps.","Select Verify when you need the first useful result now.","Return later to Your machines, Programs, and Calibration & truth to ground the economics."],expected:"All counters start at zero. Opening a section does not invent or mutate tenant data.",evidence:"VER-01/02 · Human journeys 23–32"},
    {id:"navigation",section:"Access",validation:"partial",title:"Use the rail for domains; use Jump for intent",kicker:"Navigation that scales",summary:"Rail and command-palette navigation passed. Notification read-state persistence is still part of the expanded browser audit.",image:"04-command-palette.png",steps:["Use the left rail to open Verify, Design Studio, Should-cost, Analyze DFM, or Batch.","Open Jump or press ⌘K / Ctrl+K.","Type triage and press Enter.","Open Notifications from the bell or rail to review durable state."],expected:"Triage opens and focus remains usable. Do not treat notification persistence as certified until its refresh oracle passes.",evidence:"Human journeys 25–34 · notification persistence gate open"},
    {id:"verify-upload",section:"Verify CAD",validation:"validated",title:"Drop one real CAD file and wait for a terminal result",kicker:"Use case · verify existing CAD",summary:"The Verify workspace runs geometry, routing, DFM, and should-cost against the same uploaded bytes.",image:"06-verify-result.png",steps:["Open Verify workspace, then select Verify in the internal rail.","Drop or choose cube.step.","Do not navigate away while Measured geometry is still running.","Wait until geometry, routing, DFM, and cost stop changing."],expected:"The golden file completes—no “temporarily busy” or tessellation error—and creates a durable cost decision.",evidence:"VER-05 structured oracle · training guide step 2"},
    {id:"verify-read",section:"Verify CAD",title:"Confirm geometry before reading the recommendation",kicker:"Result sanity check",summary:"A plausible recommendation on the wrong geometry is still wrong. Verify the measured facts first.",steps:["Confirm the evidence hash begins 76923244.","Confirm the envelope is 20 × 15 × 10 mm within 0.1 mm.","Confirm volume is 2717.3 mm³ ±1 and area is 1432 mm² ±2.","Confirm watertight geometry before acting on process or cost."],expected:"The displayed geometry matches the immutable fixture contract and the cost decision references the same mesh hash.",evidence:"INPUT-INTEGRITY-001 · DISPLAY-FIDELITY-001"},
    {id:"verify-act",section:"Verify CAD",validation:"partial",title:"Read recommendation, blockers, drivers, then record the action",kicker:"Decision order",summary:"Recommendation, drivers, and governance transitions pass; every decision-choice/note branch is still under browser audit.",steps:["Read Make now and the recommended process.","Open routing and DFM; click any finding that links to faces.","Open cost drivers; inspect DEFAULT or MODEL inputs.","Choose make in-house, outside, acquire, or redesign and add a note."],expected:"Approve/reopen/stale behavior is validated. All four action choices, note persistence, and unchanged-artifact comparison remain a gate.",evidence:"WORK-05 structured oracle · VER-06/07 full branch matrix open"},
    {id:"design-guardrails",section:"Design CAD",validation:"validated",title:"Describe only geometry the safe release can represent exactly",kicker:"Use case · Design Studio",summary:"Design Studio is intentionally bounded: mounting plate, L bracket, or open enclosure. Unsupported freeform requests are rejected—not approximated.",image:"07-design-unsupported.png",steps:["Open Design Studio.","Describe a plate, L bracket, or open enclosure with explicit millimetre dimensions.","Select Interpret safely.","Review every extracted field before generation."],expected:"An unsupported turbine/freeform request creates no project. Missing dimensions are named instead of guessed.",evidence:"DES-01/02 · Design journeys 3–4"},
    {id:"design-plate",section:"Design CAD",validation:"validated",title:"Generate the golden plate from exact dimensions",kicker:"Mounting plate",summary:"Use the validated sentence to learn the interpretation and generation pattern.",image:"10-design-plate.png",steps:["Enter: 120 × 70 × 8 mm plate with four 10 mm corner holes.","Select Interpret safely; confirm 120, 70, 8, 10, and 8.4 mm inset.","Select Generate design.","Wait for Ready before downloading or verifying."],expected:"The preview shows a plate with four holes; envelope is 120 × 70 × 8 mm and volume is 64.69 cm³.",evidence:"DES-05 structured artifact/hash oracle"},
    {id:"design-revise",section:"Design CAD",validation:"validated",title:"A revision creates R2; it never edits R1",kicker:"Immutable revision history",summary:"Revision history is the protection against “which file did we quote?” confusion.",image:"11-design-revisions.png",steps:["Select Revise on the plate.","Change width from 120 to 130 mm.","Generate the revision and wait for Ready.","Select R1 in Revision history to prove the prior evidence still exists."],expected:"R2 becomes current at 130 × 70 × 8 mm; R1 remains downloadable with its original hash and bytes.",evidence:"DES-10 structured revision oracle"},
    {id:"design-history",section:"Design CAD",validation:"validated",title:"Verify the exact historical revision you selected",kicker:"Design → Verify handoff",summary:"The handoff carries project, revision, filename, and file hash. Current does not silently replace historical.",image:"12-design-verify-r1.png",steps:["While R1 is selected, choose Verify revision 1.","Wait for the Verify result.","Confirm the page states you are viewing revision 1 while current is 2.","Confirm measured geometry returns to 120 × 70 × 8 mm."],expected:"Verify consumes R1 bytes—not R2—and reports the R1 64.69 cm³ geometry.",evidence:"DES-11 structured handoff oracle"},
    {id:"design-shapes",section:"Design CAD",validation:"validated",title:"Bracket and enclosure stay prismatic all the way through Verify",kicker:"Two more safe templates",summary:"Recognizable shape is not enough; routing must also reject rotational false positives.",images:["13-design-bracket.png","14-design-enclosure.png"],steps:["Generate the default 80 × 50 × 60 mm L bracket at 6 mm thickness.","Verify it; CNC Turning must not be a valid route.","Generate the default 80 × 50 × 60 mm enclosure with 3 mm walls/floor.","Verify it; the route must identify thin-wall enclosure and reject turning."],expected:"Bracket volume is 40.20 cm³; enclosure volume is 54.41 cm³. Both complete DFM and cost without rotational routing.",evidence:"DES-06–09 · Design journeys 10–13"},
    {id:"cost-workspace",section:"Cost & Governance",validation:"validated",title:"Should-cost is a saved evidence object, not a disposable estimate",kicker:"Use case · cost engineer",summary:"A completed Verify run creates the durable decision used by cost history and RFQ packages.",steps:["Open Cost decisions after a successful verification.","Open the newest row for the uploaded filename.","Review make-now process, quantity ladder, confidence, and driver provenance.","Use only exports whose contents have been reconciled to this saved record."],expected:"The saved record re-renders the same geometry, quantities, process, 48 estimates, drivers, confidence, and decision JSON after reopen and refresh.",evidence:"Training guide durable-cost oracle PASS"},
    {id:"decision-approve",section:"Cost & Governance",validation:"validated",title:"Approval changes governance state—not the calculation",kicker:"Approve and reopen",summary:"Approval is a sign-off layer around an immutable cost decision.",image:"15-decision-approve.png",steps:["Open a saved cost decision.","Select Approve and confirm the approved state.","Select Reopen when another review is required.","Confirm the status returns to Unreviewed."],expected:"Unreviewed → Approved → Unreviewed. Cost, geometry, and driver JSON remain unchanged.",evidence:"WORK-05 structured governance oracle"},
    {id:"decision-stale",section:"Cost & Governance",validation:"validated",title:"A new governed rate makes the old decision visibly stale",kicker:"Re-cost trigger",summary:"Stale is protective: it stops a prior approval from looking current after its rate basis changes.",image:"16-decision-stale.png",steps:["Publish a new governed rate-card version as an administrator.","Return to the previously saved decision.","Read the stale warning and reason.","Re-run cost before relying on or packaging the decision."],expected:"The decision shows Stale and “Re-cost before relying on this record,” with reason rate_library_published.",evidence:"WORK-05 structured governance oracle"},
    {id:"machine-floor",section:"Manufacturing",validation:"partial",title:"Declare the machines and rates the organization actually owns",kicker:"Use case · manufacturing lead",summary:"The exact rates persist and render, but the current evidence seeded them through authenticated APIs rather than completing every form branch.",image:"17-machine-floor.png",steps:["Open Your machines.","Add each machine with process, hourly rate, and working envelope.","Open Calibration & truth and publish the governed rate card.","Verify that the UI labels these values USER or SHOP—not DEFAULT."],expected:"The pinned rates are MJF $48/hr, CNC 3-axis $95/hr, CNC 5-axis $142/hr, and DMLS $185/hr. Full form-entry browser certification remains open.",evidence:"ENT-01 structured values/display · UI authoring gate open"},
    {id:"calibration",section:"Manufacturing",validation:"partial",title:"Too little real history must refuse calibration",kicker:"Ground truth floor",summary:"The refusal and persisted counts passed; complete browser-driven actuals import remains open.",image:"18-calibration.png",steps:["Open Calibration & truth.","Import historical actuals using the quote/actuals control—not the CAD uploader.","Review accepted, rejected, and duplicate counts.","Run recalibration only after the required real-data floor is met."],expected:"With four real records and a floor of eight, recalibration refuses and remains unvalidated. Do not certify the import UI until its browser journey passes.",evidence:"ENT-02 structured refusal · UI import gate open"},
    {id:"programs",section:"Manufacturing",validation:"validated",title:"Program exposure appears only after the exact volume is verified",kicker:"Program and annual economics",summary:"ProofShape withholds annualized exposure until the engine has a recommendation at the declared quantity.",image:"20-program-exposure.png",steps:["Assign the verified part to a program and parent assembly.","Declare units per parent and annual volume.","Re-verify at the exact annual quantity.","Open Programs and confirm the part and exposure roll up."],expected:"For the pinned fixture: 12,000 units × $10.08 = $120,960/year. The single-part $133.58 headline is explicitly rejected as an annual basis.",evidence:"ENT-04 structured exact-economics oracle"},
    {id:"batch",section:"Batch & Sourcing",validation:"validated",title:"A ZIP batch must finish before its CSV becomes evidence",kicker:"Use case · many parts",summary:"Session-authenticated creation and stale mounted-row defects were found during this guide and are regression-guarded.",image:"27-batch.png",steps:["Create a ZIP containing supported CAD files; keep paths simple and exclude quote CSVs.","Open Batch run, select the ZIP, and choose Start batch.","Wait for both the summary and mounted item row to say Completed.","Download CSV and reconcile one row per item."],expected:"The one-part ZIP reaches Completed 1/1 without reload; CSV headers, filename, status, verdict, process, duration, analysis URL, and error field are parsed and reconciled.",evidence:"Training guide batch/CSV semantic oracle · ISSUE-006 + live-row refresh regression"},
    {id:"rfq",section:"Batch & Sourcing",validation:"validated",title:"Build an RFQ bundle from saved decisions—without contacting a supplier",kicker:"Use case · sourcing lead",summary:"The platform generates an evidence bundle. Supplier transmission remains a separate controlled action outside this validated local flow.",image:"26-rfq-packages.png",steps:["Open RFQ packages after at least one cost decision is saved.","Enter a title and optional supplier/buyer note.","Select the decisions to include; read stale or unapproved warnings.","Select Generate package, open the result, then Download ZIP."],expected:"The ZIP is unpacked and validated: manifest, line items, supplier brief, decision JSON, 48 driver rows, context, warnings, and a real should-cost PDF all match the saved decision.",evidence:"Training guide RFQ semantic oracle · real PDF verified"},
    {id:"developer",section:"Administration",validation:"validated",title:"Create an API key once, then treat the secret as gone",kicker:"Use case · developer/admin",summary:"Developer settings reveals the full key exactly once; later screens retain only its prefix and status.",image:"21-developer-settings.png",steps:["Open API & docs / Developer settings.","Select Create key and use it once against the API.","Reload and confirm the secret is gone; rotate and confirm the old key is rejected.","Revoke the replacement and confirm it is rejected."],expected:"Create/use/reload/rotate/reject-old/use-new/revoke/reject-new all pass while the dashboard session remains separate.",evidence:"WORK-12 · enterprise key-lifecycle browser oracle"},
    {id:"roles",section:"Administration",validation:"partial",title:"A viewer can read allowed evidence but cannot administer the organization",kicker:"Roles, security, and organization",summary:"Viewer denial and two-organization backend boundaries pass; the complete browser role/tenant matrix remains open.",image:"22-viewer-gate.png",steps:["Use Organization to invite a member and assign the intended role.","Use Security to review password/session and configured SSO surfaces.","Sign in as a viewer and open permitted evidence.","Attempt an admin operation only in a test tenant; confirm it is denied."],expected:"Viewer admin API returns 403. API keys stay bound to their issuing org and cross-org cache/worker writes are blocked. Full two-org browser ID/download substitution is not yet certified.",evidence:"ROLE-01 structured browser oracle + two-org backend regressions · ROLE-02–04 browser gate open"},
    {id:"integrations",section:"Administration",validation:"partial",title:"Connector simulation proves the contract—not a live vendor relationship",kicker:"Integration boundary",summary:"Local SAP/Windchill fixtures and credential lifecycles pass. Real vendor sandbox acceptance remains a staging gate.",image:"25-integrations.png",steps:["Open Integrations and identify the connector type and read-only boundary.","Create a credential profile only for an approved sandbox endpoint.","Probe the profile; confirm configured, read-only, and sandbox labels.","Revoke the profile after validation and confirm no secret appears in responses."],expected:"Local normalization and secret-redacted lifecycle pass. This does not mean SAP or Windchill accepted a live connection.",evidence:"LOCAL_ONLY connector fixtures PASS · live sandbox gate open"},
    {id:"recovery",section:"Recovery",validation:"partial",dark:true,title:"Stop on explicit failure copy; recover from the stated cause",kicker:"Recovery coverage in progress",summary:"Several bounded error states pass, but the full injected failure/retry matrix is not certified yet.",image:"23-login-recovery.png",steps:["Invalid login: correct the credentials; the message does not reveal whether the account exists.","Network login failure: restore connectivity, then submit once.","Unsupported batch file: choose a ZIP; do not rename an arbitrary file.","Cost-history API failure: keep the page, restore the service, then Refresh."],expected:"Known error copy is bounded and actionable. Exactly-once retry after every queue, kernel, store, API, and infrastructure fault remains a production gate.",evidence:"P7 bounded failures · FAIL-01–10 recovery matrix open"},
    {id:"mobile",section:"Recovery",validation:"partial",title:"Mobile is for review and bounded actions",kicker:"390 × 844 smoke-checked surface",summary:"The shell and Design Studio fallback load on a phone. Full record/decision/download identity continuity is still under audit.",image:"24-mobile-verify.png",steps:["Open the same ProofShape URL in the mobile browser.","Use the labeled section selector instead of relying on icon-only scrolling.","Review results, decisions, notifications, or RFQ status.","Return to desktop for dimension-heavy design entry when precision matters."],expected:"Navigation and fallback evidence are reachable. No-overflow and complete interactive workflow certification across 375/390/768 widths remains open.",evidence:"Mobile shell/fallback smoke PASS · interactive mobile matrix open"},
    {id:"finish",section:"Finish",dark:true,title:"You are done when the evidence matches—not when the spinner stops",kicker:"Completion checklist",summary:"A completed ProofShape task has a visible result, a durable record when required, correct provenance, and a known recovery path.",metrics:[["5/5","guide workflows"],["31/31","deck slides"],["FULL","code regression"],["OPEN","full golden matrix"]],steps:["Confirm the expected outcome on your use-case slides.","Save or export only the reviewed immutable record.","Escalate any mismatch with filename, route, timestamp, and screenshot.","Do not call the platform production-ready until the hardened local and staging gates pass."],expected:"The validated guide subset is usable locally. Full browser outcome coverage, managed email, S3, Sentry, Turnstile, real IdP/vendor sandboxes, DNS/TLS, private-plane legal boundaries, and customer accuracy evidence remain launch requirements.",evidence:"Guide E2E PASS · deck UI PASS · frontend 299/299 · full backend regression · expanded audit open"}
  ];
  const sections=[...new Set(slides.map(s=>s.section))];
  const deck=document.getElementById("deck"),counter=document.getElementById("counter"),progress=document.getElementById("progress"),sectionNav=document.getElementById("sectionNav"),drawer=document.getElementById("drawer"),drawerLinks=document.getElementById("drawerLinks"),modal=document.getElementById("modal"),modalImage=document.getElementById("modalImage");
  let index=0; const state=JSON.parse(localStorage.getItem("proofshapeGuideProgress")||"{}");
  const esc=s=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]));
  function stepMarkup(slide){return slide.steps?`<ol class="steps">${slide.steps.map((x,i)=>`<li class="step ${state[slide.id]?.includes(i)?"done":""}"><button data-check="${i}" aria-label="Mark step ${i+1} complete">${state[slide.id]?.includes(i)?"✓":i+1}</button><div class="step-text">${esc(x)}</div></li>`).join("")}</ol>`:""}
  function cards(slide){if(slide.roles)return `<div class="role-grid">${slide.roles.map(r=>`<button class="card role-btn" data-jump="${r[2]}"><strong>${esc(r[0])}</strong><span>${esc(r[1])}</span><span class="route">OPEN PATH →</span></button>`).join("")}</div>`;if(slide.metrics)return `<div class="metric-grid">${slide.metrics.map(m=>`<div class="card metric"><strong>${esc(m[0])}</strong><span>${esc(m[1])}</span></div>`).join("")}</div>`;if(slide.legend)return `<div class="legend-grid">${slide.legend.map(l=>`<div class="card"><strong><i class="legend-dot ${l[1].startsWith("○")?"hollow":""}" style="background:${l[0]};color:${l[0]}"></i>${esc(l[1])}</strong><span>${esc(l[2])}</span></div>`).join("")}</div>`;if(slide.flow)return `<div class="flow-grid">${slide.flow.map(f=>`<div class="card flow-card"><strong>${esc(f[0])}</strong><span>${esc(f[1])}</span></div>`).join("")}</div>`;return ""}
  function validationBadge(slide){const status=slide.validation||"evidence";const label=status==="validated"?"✓ VALIDATED":status==="partial"?"△ PARTIAL":"• EVIDENCE SCREEN";return `<span class="validation-badge ${status}">${label}</span>`}
  function media(slide){if(slide.images)return `<div class="media"><div class="media-frame two-up">${validationBadge(slide)}${slide.images.map((x,i)=>`<img src="${A+x}" alt="${esc(slide.title)} evidence ${i+1}" loading="lazy">`).join("")}</div></div>`;if(slide.image)return `<div class="media"><div class="media-frame">${validationBadge(slide)}<img src="${A+slide.image}" alt="${esc(slide.title)} platform evidence" loading="lazy"></div></div>`;return ""}
  function render(){deck.innerHTML=slides.map((s,i)=>`<section class="slide ${s.dark?"dark":""} ${!s.image&&!s.images?"no-image":""} ${i===index?"active":""}" data-id="${s.id}" aria-hidden="${i===index?"false":"true"}"><div class="copy"><p class="eyebrow">${esc(s.kicker||s.section)}</p><h${i===0?"1":"2"}>${esc(s.title)}</h${i===0?"1":"2"}><p class="lede">${esc(s.summary||"")}</p>${cards(s)}${stepMarkup(s)}${s.expected?`<div class="expected"><strong>${s.validation==="partial"?"Validated scope / remaining gate":"Expected outcome"}</strong><br>${esc(s.expected)}</div>`:""}<div class="evidence">EVIDENCE · ${esc(s.evidence||"")}</div></div>${media(s)}</section>`).join("");bind();updateChrome()}
  function bind(){deck.querySelectorAll("[data-check]").forEach(b=>b.onclick=()=>{const s=slides[index],n=Number(b.dataset.check),set=new Set(state[s.id]||[]);set.has(n)?set.delete(n):set.add(n);state[s.id]=[...set];localStorage.setItem("proofshapeGuideProgress",JSON.stringify(state));render()});deck.querySelectorAll("[data-jump]").forEach(b=>b.onclick=()=>goToId(b.dataset.jump));deck.querySelectorAll("img").forEach(img=>img.onclick=()=>{modalImage.src=img.src;modal.classList.add("open")})}
  function updateChrome(){counter.textContent=`${index+1} / ${slides.length}`;progress.style.width=`${((index+1)/slides.length)*100}%`;location.hash=`slide=${slides[index].id}`;[...sectionNav.children].forEach(b=>b.classList.toggle("active",b.dataset.section===slides[index].section))}
  function go(n){index=Math.max(0,Math.min(slides.length-1,n));render();deck.focus?.()}
  function goToId(id){const n=slides.findIndex(s=>s.id===id);if(n>=0){drawer.classList.remove("open");go(n)}}
  sections.forEach(sec=>{const b=document.createElement("button");b.className="section-btn";b.dataset.section=sec;b.textContent=sec;b.onclick=()=>go(slides.findIndex(s=>s.section===sec));sectionNav.appendChild(b);const d=document.createElement("button");d.textContent=sec;d.onclick=b.onclick;drawerLinks.appendChild(d)});
  document.getElementById("prevBtn").onclick=()=>go(index-1);document.getElementById("nextBtn").onclick=()=>go(index+1);document.getElementById("menuBtn").onclick=()=>drawer.classList.toggle("open");document.getElementById("fullBtn").onclick=()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen();document.getElementById("closeModal").onclick=()=>modal.classList.remove("open");modal.onclick=e=>{if(e.target===modal)modal.classList.remove("open")};
  addEventListener("keydown",e=>{if(e.key==="ArrowRight"||e.key==="PageDown"||e.key===" "){e.preventDefault();go(index+1)}if(e.key==="ArrowLeft"||e.key==="PageUp"){e.preventDefault();go(index-1)}if(e.key==="Home")go(0);if(e.key==="End")go(slides.length-1);if(e.key.toLowerCase()==="f")document.getElementById("fullBtn").click();if(e.key==="Escape"){modal.classList.remove("open");drawer.classList.remove("open")}});
  const hashId=(location.hash.match(/slide=([^&]+)/)||[])[1];if(hashId){const n=slides.findIndex(s=>s.id===decodeURIComponent(hashId));if(n>=0)index=n}render();
  </script>
