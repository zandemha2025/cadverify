<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="dark light" />
  <title>ProofShape — zero-to-production platform guide</title>
  <style>
    :root {
      --bg:#f6f6f7; --panel:#fff; --hair:#e2e2e6; --ink:#17181a;
      --muted:rgba(23,24,26,.66); --blue:#3772ab; --shop:#a06030;
      --user:#745cc7; --default:#69707d; --pass:#1d7f54;
      --warn:#966614; --fail:#c2453a; --shadow:0 24px 80px rgba(20,28,42,.14);
      --sans:"Helvetica Neue",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
      --mono:ui-monospace,"SF Mono","SFMono-Regular",Menlo,monospace;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:#050506;color:#f5f5f7;font-family:var(--sans)}
    button,input{font:inherit}
    button{cursor:pointer}
    button:focus-visible,a:focus-visible,.slide:focus-visible{outline:3px solid #74aee0;outline-offset:3px}
    .app{min-height:100vh;display:grid;grid-template-rows:58px 1fr 54px;background:#050506}
    .topbar{position:sticky;top:0;z-index:20;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:24px;padding:0 24px;border-bottom:1px solid rgba(245,245,247,.1);background:rgba(5,5,6,.94);backdrop-filter:blur(18px)}
    .wordmark{font-weight:600;letter-spacing:-.03em}.wordmark small{font:10px var(--mono);letter-spacing:.15em;color:rgba(245,245,247,.45);margin-left:10px}
    .progress-track{height:2px;background:rgba(245,245,247,.09);position:relative}.progress-bar{height:100%;background:#9fc3e4;transition:width .35s ease}
    .top-actions{display:flex;align-items:center;gap:8px}
    .icon-btn,.nav-btn,.section-btn,.role-btn,.check-btn{border:1px solid rgba(245,245,247,.16);background:transparent;color:#f5f5f7;border-radius:999px;padding:8px 13px}
    .icon-btn:hover,.nav-btn:hover,.section-btn:hover,.role-btn:hover{background:#f5f5f7;color:#050506}
    .counter{font:11px var(--mono);color:rgba(245,245,247,.6);min-width:56px;text-align:center}
    main{position:relative;min-height:0;overflow:hidden}
    .deck{height:calc(100vh - 112px);position:relative}
    .slide{position:absolute;inset:0;display:grid;grid-template-columns:minmax(340px,.86fr) minmax(520px,1.35fr);gap:46px;padding:54px clamp(34px,6vw,94px);opacity:0;pointer-events:none;transform:translateX(30px);transition:opacity .32s ease,transform .32s ease;background:var(--bg);color:var(--ink);overflow:auto}
    .slide.active{opacity:1;pointer-events:auto;transform:none}
    .slide[inert]{visibility:hidden}
    .slide.dark{background:#050506;color:#f5f5f7}
    .slide.no-image{grid-template-columns:1fr}.slide.no-image .copy{max-width:1060px;margin:auto;width:100%}
    .copy{display:flex;flex-direction:column;justify-content:center;min-width:0}
    .eyebrow{margin:0 0 16px;font:11px var(--mono);letter-spacing:.22em;text-transform:uppercase;color:var(--blue)}
    .dark .eyebrow{color:#9fc3e4}
    h1,h2{margin:0;font-weight:350;letter-spacing:-.045em;line-height:1.02}
    h1{font-size:clamp(46px,6.2vw,88px)}h2{font-size:clamp(38px,4.3vw,64px)}
    .lede{font-size:clamp(17px,1.55vw,23px);line-height:1.46;color:var(--muted);max-width:760px;margin:22px 0 0}
    .dark .lede{color:rgba(245,245,247,.62)}
    .steps{display:grid;gap:10px;margin:28px 0 0;padding:0;list-style:none}
    .step{display:grid;grid-template-columns:34px 1fr;gap:12px;align-items:start;padding:12px 0;border-top:1px solid var(--hair);font-size:16px;line-height:1.4}
    .step-text,.expected,.evidence{min-width:0;overflow-wrap:anywhere}
    .dark .step{border-color:rgba(245,245,247,.1)}
    .step button{width:28px;height:28px;border:1px solid var(--hair);border-radius:7px;background:var(--panel);color:var(--ink);font:12px var(--mono)}
    .dark .step button{border-color:rgba(245,245,247,.18);background:#0b0c0f;color:#f5f5f7}
    .step.done button{background:var(--pass);border-color:var(--pass);color:#fff}.step.done .step-text{text-decoration:line-through;color:var(--muted)}
    .expected{margin-top:20px;padding:15px 17px;border-left:3px solid var(--pass);background:rgba(29,127,84,.07);font-size:15px;line-height:1.45}
    .dark .expected{background:rgba(85,184,128,.08)}
    .evidence{margin-top:14px;font:10px/1.45 var(--mono);letter-spacing:.04em;color:var(--muted)}
    .dark .evidence{color:rgba(245,245,247,.42)}
    .media{position:relative;display:flex;align-items:center;justify-content:center;min-width:0}
    .media-frame{position:relative;width:100%;max-height:100%;border:1px solid var(--hair);border-radius:18px;background:var(--panel);padding:10px;box-shadow:var(--shadow);overflow:hidden}
    .dark .media-frame{background:#0b0c0f;border-color:rgba(245,245,247,.13);box-shadow:none}
    .media img{display:block;width:100%;height:auto;max-height:calc(100vh - 190px);object-fit:contain;border-radius:11px;cursor:zoom-in}
    .validation-badge{position:absolute;right:18px;top:18px;z-index:2;padding:7px 10px;border-radius:999px;border:1px solid rgba(105,112,125,.3);background:rgba(250,250,251,.94);color:var(--default);font:10px var(--mono);letter-spacing:.06em}
    .copy>.validation-badge{position:static;align-self:flex-start;margin:0 0 12px}
    .validation-badge.validated{border-color:rgba(29,127,84,.26);background:rgba(244,255,249,.94);color:var(--pass)}
    .validation-badge.partial{border-color:rgba(150,102,20,.3);background:rgba(255,250,238,.95);color:var(--warn)}
    .dark .validation-badge{background:rgba(5,5,6,.88)}.dark .validation-badge.validated{border-color:rgba(85,184,128,.32);color:#55b880}.dark .validation-badge.partial{border-color:rgba(221,171,75,.38);color:#ddab4b}
    .two-up{display:grid;grid-template-columns:1fr 1fr;gap:12px}.two-up img{height:clamp(260px,48vh,520px);object-fit:cover;object-position:top}
    .role-grid,.metric-grid,.legend-grid,.flow-grid{display:grid;gap:14px;margin-top:30px}
    .role-grid{grid-template-columns:repeat(3,1fr)}.metric-grid{grid-template-columns:repeat(4,1fr)}.legend-grid{grid-template-columns:repeat(3,1fr)}.flow-grid{grid-template-columns:repeat(7,1fr)}
    .card{border:1px solid var(--hair);background:var(--panel);border-radius:16px;padding:18px;text-align:left;color:var(--ink)}
    .dark .card{border-color:rgba(245,245,247,.11);background:#0b0c0f;color:#f5f5f7}
    .card strong{display:block;font-size:17px;margin-bottom:8px}.card span{display:block;color:var(--muted);font-size:13px;line-height:1.4}.dark .card span{color:rgba(245,245,247,.5)}
    .card .route{font:10px var(--mono);color:var(--blue);margin-top:12px}.dark .card .route{color:#9fc3e4}
    .actions,.role-progress{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:14px}
    .action-link,.role-progress button{display:inline-flex;align-items:center;justify-content:center;min-height:38px;border:1px solid var(--hair);border-radius:999px;padding:8px 13px;background:var(--panel);color:var(--ink);font:10px var(--mono);letter-spacing:.03em;text-decoration:none}
    .action-link.primary{background:var(--ink);border-color:var(--ink);color:#fff}.dark .action-link,.dark .role-progress button{background:#0b0c0f;border-color:rgba(245,245,247,.18);color:#f5f5f7}.dark .action-link.primary{background:#f5f5f7;color:#050506}
    .role-progress{border-top:1px solid var(--hair);padding-top:10px}.dark .role-progress{border-color:rgba(245,245,247,.1)}.role-progress span{font:10px var(--mono);color:var(--muted);margin-right:auto}.dark .role-progress span{color:rgba(245,245,247,.55)}
    .metric strong{font:28px var(--mono);letter-spacing:-.04em}.metric span{margin-top:8px}
    .legend-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:8px}.hollow{background:transparent!important;border:1.5px solid currentColor}
    .flow-card{text-align:center;position:relative;padding:16px 10px}.flow-card:not(:last-child)::after{content:"→";position:absolute;right:-13px;top:45%;color:var(--muted);font:18px var(--mono)}
    .flow-card strong{font:12px var(--mono);letter-spacing:.05em}.flow-card span{font-size:11px}
    .footer{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px;padding:0 24px;border-top:1px solid rgba(245,245,247,.1);background:#050506}
    .section-nav{display:flex;gap:7px;overflow:auto;scrollbar-width:none}.section-btn{font:10px var(--mono);white-space:nowrap;padding:7px 10px}.section-btn.active{background:#f5f5f7;color:#050506}
    .prev-next{display:flex;gap:8px}.footer .hint{justify-self:end;font:10px var(--mono);color:rgba(245,245,247,.38)}
    .drawer{position:fixed;inset:58px auto 54px 0;width:min(380px,88vw);z-index:40;background:#08090b;border-right:1px solid rgba(245,245,247,.12);padding:26px;transform:translateX(-102%);transition:transform .25s ease;overflow:auto}.drawer.open{transform:none}
    .drawer h3{font-size:25px;font-weight:400;margin:0 0 18px}.drawer button{display:block;width:100%;text-align:left;margin:7px 0;border:0;background:transparent;color:rgba(245,245,247,.65);padding:11px;border-radius:9px}.drawer button:hover{background:#f5f5f7;color:#050506}
    .platform-config{padding:14px;margin:0 0 18px;border:1px solid rgba(245,245,247,.14);border-radius:14px}.platform-config label{display:block;font:10px var(--mono);letter-spacing:.05em;color:rgba(245,245,247,.62)}.platform-config input{width:100%;min-height:44px;margin:9px 0 5px;padding:10px 12px;border:1px solid rgba(245,245,247,.2);border-radius:9px;background:#111318;color:#f5f5f7}.platform-config small{display:block;color:rgba(245,245,247,.48);line-height:1.4}.platform-config .config-error{color:#ef9a92;min-height:1.4em}.action-link.disabled{border-style:dashed;color:var(--muted);background:transparent}
    .modal{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.86);display:none;align-items:center;justify-content:center;padding:32px}.modal.open{display:flex}.modal img{max-width:96vw;max-height:92vh;object-fit:contain}.modal button{position:absolute;right:20px;top:20px}
    .status-row{display:flex;gap:9px;flex-wrap:wrap;margin-top:22px}.pill{border:1px solid var(--hair);border-radius:999px;padding:8px 11px;font:10px var(--mono);color:var(--muted)}.dark .pill{border-color:rgba(245,245,247,.14);color:rgba(245,245,247,.55)}
    @media(max-height:800px) and (min-width:981px){
      .slide{padding:12px clamp(30px,4.8vw,62px);gap:36px}
      .copy{justify-content:flex-start}
      .slide.no-image{padding-top:9px;padding-bottom:9px}
      .slide.no-image .copy{margin:0 auto}
      .eyebrow{margin-bottom:8px}
      h1{font-size:clamp(44px,5vw,60px)}h2{font-size:clamp(34px,3.5vw,48px)}
      .lede{font-size:clamp(15px,1.3vw,18px);line-height:1.35;margin-top:10px}
      .steps{gap:4px;margin-top:13px}
      .step{grid-template-columns:29px 1fr;gap:9px;padding:6px 0;font-size:14px;line-height:1.28}
      .step button{width:25px;height:25px}
      .expected{margin-top:10px;padding:9px 12px;font-size:13px;line-height:1.35}
      .evidence{margin-top:7px;font-size:9px}
      .copy>.validation-badge{margin-bottom:5px;padding:5px 8px;font-size:8px}
      .actions,.role-progress{margin-top:6px;gap:5px}.action-link,.role-progress button{min-height:29px;padding:5px 9px;font-size:8px}.role-progress{padding-top:5px}
      .role-grid,.metric-grid,.legend-grid,.flow-grid{gap:8px;margin-top:14px}
      .card{padding:11px;border-radius:12px}.card strong{font-size:14px;margin-bottom:4px}.card span{font-size:11px}.card .route{margin-top:6px}.metric strong{font-size:23px}.metric span{margin-top:4px}
      .role-grid{gap:6px}.role-grid .card{padding:8px}.role-grid .card .route{margin-top:2px;font-size:8px}
      .slide[data-id="roles"] .lede{margin-top:6px}
      .slide[data-id="roles"] h2{font-size:38px}
      .slide[data-id="roles"] .role-grid{margin-top:6px;grid-template-columns:repeat(3,1fr)}
      .slide[data-id="roles"] .expected{margin-top:5px;padding:6px 10px}
      .slide[data-id="roles"] .evidence{margin-top:4px}
      .flow-card{padding:11px 7px}
      .media img{max-height:calc(100vh - 160px)}
    }
    @media(max-width:980px){.slide{grid-template-columns:1fr;padding:38px 26px;gap:26px}.copy{justify-content:flex-start}.media{align-items:flex-start}.media img{max-height:none}.role-grid,.metric-grid,.legend-grid{grid-template-columns:repeat(2,1fr)}.flow-grid{grid-template-columns:repeat(2,1fr)}.flow-card::after{display:none}.footer .hint{display:none}.footer{grid-template-columns:auto 1fr}.section-nav{justify-content:flex-end}}
    @media(max-width:620px){.topbar{padding:0 12px;gap:10px}.wordmark small{display:none}.top-actions .icon-btn:nth-child(2){display:none}.slide{padding:24px 18px 34px}.role-grid,.metric-grid,.legend-grid,.two-up{grid-template-columns:1fr}.deck{height:calc(100vh - 112px)}h1{font-size:42px}h2{font-size:34px}.lede{font-size:16px}.footer{padding:0 10px}.section-nav{display:none}.step{grid-template-columns:44px 1fr}.step button,.icon-btn,.nav-btn,.role-btn,.action-link,.role-progress button,.drawer button{min-width:44px;min-height:44px}.prev-next{gap:12px}}
    @media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition:none!important}}
  </style>
</head>

  const slides=[
    {id:"cover",section:"Start",dark:true,title:"ProofShape, from zero to a defensible result",kicker:"Interactive platform walkthrough",summary:"A role-based, step-by-step guide from account access through verified CAD, governed cost, manufacturing context, batch work, RFQ evidence, administration, and recovery.",image:"01-public-home.png",actions:[["Open the platform","/verify","app","primary"]],expected:"Use the arrows, section tabs, or role menu. Check off each action as you perform it; progress stays on this device.",evidence:"Production-candidate guide · browser-validated outcomes · updated 2026-07-13"},
    {id:"guarantee",section:"Start",dark:true,title:"A loaded screen is not proof that the work succeeded",kicker:"Evidence standard",summary:"A validated path must reach its visible, durable, numerical, downloadable, authorization, and recovery outcomes on the same committed build.",metrics:[["64","defined local contracts"],["53","guided slides"],["10","required recoveries"],["EXACT","commit-bound gate"]],steps:["Perform the stated action as a user would.","Compare the result to the exact expected-outcome box.","Stop if any identity, number, file, state, or recovery result differs."],expected:"LOCAL_100 is earned only when all 64 required browser and recovery contracts pass against the exact clean commit. The numbers on this slide describe the contract; they do not certify the build you are viewing.",evidence:"local-100-golden-gate.mjs · no stale, generic, mixed-run, or dirty-build evidence accepted"},
    {id:"roles",section:"Start",title:"Choose the path that matches the work you need to finish",kicker:"Role-based navigation",summary:"Complete Access first, then choose a role. The guide will show Previous/Next in my role so you do not have to infer an itinerary.",roles:[["CAD engineer","Verify and investigate CAD","cad","7 guided stops"],["Design engineer","Create, revise, and archive","design","7 guided stops"],["Cost engineer","Cost, govern, compare, share","cost","9 guided stops"],["Manufacturing lead","Machines, DFM, truth, triage","manufacturing","8 guided stops"],["Sourcing lead","Records, compare, RFQ bundle","sourcing","7 guided stops"],["Administrator","Access, roles, keys, providers","admin","9 guided stops"],["Viewer / auditor","Read evidence; prove boundaries","auditor","5 guided stops"],["Public evaluator","Assess method before an account","public","4 guided stops"]],expected:"Choose a role; then use Next in my role until the itinerary says complete. On a PARTIAL slide, stop at the named external boundary.",evidence:"Role itineraries mapped to canonical browser paths and explicit provider boundaries"},
    {id:"lifecycle",section:"Start",title:"One part becomes one traceable decision chain",kicker:"The governing object model",summary:"ProofShape does not stop at a mesh or a price. Every useful result travels through a visible evidence chain.",flow:[["CAD","file + hash"],["Geometry","measured"],["Routing","process fit"],["DFM","findings"],["Cost","drivers"],["Decision","approved state"],["Record","export + history"]],expected:"If an upstream stage fails, downstream stages are withheld. A blank or withheld value is never silently treated as zero.",evidence:"Verify pipeline, decision persistence, export, and history browser journeys"},
    {id:"trust",section:"Start",title:"Read the dots before you trust the number",kicker:"Provenance legend",summary:"Color identifies where a value came from. Filled dots are grounded; hollow dots are assumptions or model output.",legend:[["#3772ab","● MEASURED","read from CAD geometry"],["#a06030","● SHOP","bound to a governed shop rate"],["#745cc7","● USER","declared by a person"],["#a12d86","● CAD","read from CAD annotation"],["#69707d","○ DEFAULT","generic fallback"],["#69707d","○ MODEL","computed from assumptions"]],steps:["Prefer MEASURED, SHOP, USER, or CAD values for decisions.","Open drivers when DEFAULT or MODEL appears.","Treat a hatched confidence band as assumption-based, not validated."],expected:"Every cost, dimension, quantity, rate, source, and identifier keeps its provenance label.",evidence:"Accessibility token tests + enterprise methodology-fidelity gate"},
    {id:"before",section:"Start",title:"Download the exact practice files before the first upload",kicker:"Zero-step checklist",summary:"Use the controlled fixtures first. That separates platform behavior from an unknown customer file, then you can repeat with your own CAD.",actions:[["Download golden cube.step","cube-step","fixture","primary"],["Download machine import CSV","machine-csv","fixture"],["Download one-part batch ZIP","batch-zip","fixture"],["Read every fixture outcome","fixtures/README.md","asset"]],steps:["Get the ProofShape URL from your administrator or open it from this guide.","Download the three core fixtures and the outcome README above; do not rename or edit them.","Use the STEP in Verify and direct Should-cost, the CSV only in Your machines, and the ZIP only in Batch. Download advanced fixtures only on their use-case slides."],expected:"The golden STEP is exactly 19,030 bytes with SHA-256 76923244…61103a. Every downloadable fixture is independently hashed and parsed by the release suite; the README names its exact accepted and rejected outcomes.",evidence:"Fixture bytes + parser contracts + deck download/re-hash QA"},

    {id:"access",section:"Access",validation:"validated",dark:true,title:"Use the access method the screen actually offers",kicker:"First access decision",summary:"ProofShape supports distinct password, verified email-link, invitation, and enterprise SSO paths. Do not substitute one path for another.",image:"02-login.png",actions:[["Open sign in","/login","app","primary"],["Open sign up","/signup","app"]],steps:["Open Sign up and read the offered method before entering anything.","If email-link is offered, request the one-time link and open it in the same browser; then optionally set a password in Security.","If SSO is offered, use the named organization provider.","Use direct email/password signup only when the screen explicitly offers it; the local development build does."],expected:"Successful access lands on /verify and shows DAY ZERO SETUP. Weak credentials, expired links, wrong invited identities, and unsafe return paths are rejected without creating a false session.",evidence:"AUTH-01–05 · password/email-link exchange · safe-return-path regressions"},
    {id:"access-modes",section:"Access",validation:"partial",title:"Know which access branches are locally proven and which need a real provider",kicker:"Password · email link · SSO",summary:"The application contracts for all three modes are tested. Production email delivery and a customer IdP cannot be certified with local stand-ins.",steps:["Password branch: enter the registered email and password, then confirm the requested safe page opens.","Email-link branch: enter the email, pass Turnstile when configured, open the single-use link, then confirm replay fails.","SSO branch: choose the configured provider, complete its test-tenant policy, and return through the signed callback.","After any branch, sign out and confirm protected routes return to login."],expected:"Local password and token-exchange contracts are validated. PARTIAL remains until the real email domain, Turnstile, and production IdP test tenant each pass delivery, expiry, replay, group, and logout acceptance.",evidence:"Auth canonical matrix · live email/Turnstile/IdP acceptance remains external"},
    {id:"invite-accept",section:"Access",validation:"validated",title:"An organization invitation belongs only to the invited identity",kicker:"Invitation lifecycle",summary:"The token does not replace authentication. Sign in as the exact invited email, then redeem it once.",actions:[["Open organization settings","/settings/organization","app","primary"]],steps:["As an organization admin, enter the recipient’s permanent email and least-privileged role; select Send invite.","Copy the acceptance URL through the approved delivery channel.","In a separate browser, authenticate as that exact email, then open the acceptance URL.","Confirm membership and role; prove a second redemption, wrong identity, expired link, or revoked invite cannot grant access."],expected:"One active membership is created for the invited identity at the intended role. Revocation and replay are durable; neither a token leak nor a different signed-in user can join the organization.",evidence:"AUTH-03 · ROLE-03 invitation create/revoke/accept boundary"},
    {id:"session-security",section:"Access",validation:"validated",title:"Finish account setup, then prove the session can end",kicker:"Password and session hygiene",summary:"Email-link users may initialize a password once when the configured auth mode allows it. Every user must be able to sign out cleanly.",actions:[["Open Security","/settings/security","app","primary"]],steps:["Open Security and read the configured auth mode.","If Initial password is available, enter matching values that meet the displayed policy and submit once.","Sign out from the account menu; use Back and refresh on a protected route.","Sign in again through the approved method and confirm the intended tenant—not another recent tenant—opens."],expected:"Password initialization never weakens email-link recovery; sign-out removes the session, protected pages stay protected after Back/refresh, and a new login restores only authorized tenant state.",evidence:"AUTH-02/05/07/08 · session boundary and password initialization"},
    {id:"day-zero",section:"Access",validation:"validated",title:"Day Zero tells you what is real—and what is empty",kicker:"First authenticated screen",summary:"A new organization starts with no seeded machines, records, actuals, or program context.",image:"03-day-zero.png",steps:["Read the four setup steps.","Select Verify when you need the first useful result now.","Return later to Your machines, Programs, and Calibration & truth to ground the economics."],expected:"All counters start at zero. Opening or revisiting a section does not invent or mutate tenant data.",evidence:"VER-01/02 · public/auth golden matrix"},
    {id:"navigation",section:"Access",validation:"validated",title:"Use the rail for domains; use Jump for intent",kicker:"Navigation that scales",summary:"Desktop, mobile selector, command palette, back/forward, refresh, and restart journeys preserve the user’s place and record identity.",image:"04-command-palette.png",steps:["Use the left rail to open Verify, Design Studio, Cost decisions, Analyze DFM, or Batch.","Open Jump or press ⌘K / Ctrl+K.","Type triage and press Enter.","Use browser Back and Forward; confirm the same record remains selected."],expected:"The requested surface opens, focus remains usable, and navigation never substitutes a different tenant, design, revision, or decision.",evidence:"AUTH-07/08 · VER-09 · mobile responsive-loop oracle"},
    {id:"notifications",section:"Access",validation:"validated",title:"Notifications are durable work state—not decorative toast",kicker:"Read, dismiss, restore, and return",summary:"Unread counts, destinations, dismissal, restoration, mark-all-read, refresh, logout/login, and deletion behavior are browser-validated.",image:"05-notifications.png",steps:["Open Notifications and select a row by its accessible title.","Return, dismiss it, then restore it.","Mark all read and refresh the page.","Sign out and back in; confirm the durable state remains."],expected:"The destination is correct, unread count reaches zero, read and dismissal timestamps survive the session boundary, and deleting the source produces an honest not-found state.",evidence:"VER-04 · ROLE-04 · FAIL-09 notification matrix"},
    {id:"public-evaluator",section:"Access",validation:"validated",title:"Evaluate the method and boundaries before creating an account",kicker:"Public evaluator path",summary:"The public site explains the platform, method, security posture, team use cases, and API boundary without exposing tenant data.",actions:[["Read the method","/method","app","primary"],["See the platform","/platform","app"],["Review security","/security","app"],["Open developer docs","/developers","app"]],steps:["Open each public page in a private browser with no ProofShape session.","Compare the method claims with the visible provenance and confidence language.","Confirm calls to protected organization, decision, machine, and batch APIs are rejected.","Create an account only when you are ready to use a private workspace."],expected:"Public content loads without tenant facts; protected data remains 401/redirected; public claims never imply a live supplier send, certified quote, or configured customer provider.",evidence:"PUBLIC-01–04 · unauthenticated tenant-boundary matrix"},

    {id:"verify-upload",section:"Verify CAD",validation:"validated",title:"Drop one real CAD file and wait for a terminal result",kicker:"Use case · verify existing CAD",summary:"The Verify workspace runs geometry, routing, DFM, and should-cost against the same uploaded bytes.",image:"06-verify-result.png",steps:["Open Verify workspace, then select Verify in the internal rail.","Drop or choose cube.step.","Do not navigate away while Measured geometry is running.","Wait until geometry, routing, DFM, and cost stop changing."],expected:"The golden file completes—without “temporarily busy” or tessellation error—and creates a durable cost decision.",evidence:"VER-05 · training-guide semantic oracle"},
    {id:"verify-read",section:"Verify CAD",title:"Confirm geometry before reading the recommendation",kicker:"Result sanity check",summary:"A plausible recommendation on the wrong geometry is still wrong. Verify the measured facts first.",steps:["Confirm the full evidence SHA-256 is 76923244d66efcbf1eb1639a26a6b4b6bd20fd73eaf44ad1b95268dddf61103a.","Confirm the sorted envelope is 10 × 15 × 20 mm within 0.1 mm.","Confirm normalized volume is 2.72 cm³ ±0.005 and area is 14.32 cm² ±0.02.","Confirm watertight true, make-now fdm, quantities 1/100/1000/2000/5000/10000, and 48 estimate rows before acting."],expected:"The live UI and reopened private decision show the exact source SHA-256. Geometry, fdm make-now route, 923-unit crossover, six recommendation points, and 48 estimate rows match the versioned golden oracle; model-derived prices remain explicitly assumption-based.",evidence:"INPUT-INTEGRITY-001 · DISPLAY-FIDELITY-001 · training-guide pinned cost oracle"},
    {id:"verify-act",section:"Verify CAD",validation:"validated",title:"Read recommendation, blockers, drivers, then record the action",kicker:"Decision and disposition branches",summary:"Recommendation, notes, governance, and every supported disposition are persisted and reopened through the browser.",steps:["Read Make now and the recommended process.","Open routing and DFM; inspect linked evidence.","Open cost drivers; inspect DEFAULT or MODEL inputs.","Choose make in-house, outside, acquire, or redesign and add a note."],expected:"Every choice and trimmed/empty note round-trips exactly; approve, reopen, stale, reload, and unchanged-artifact checks preserve the underlying calculation.",evidence:"VER-06/07 · WORK-05 notification/decision matrix"},
    {id:"analyze-dfm",section:"Verify CAD",validation:"validated",title:"Use Analyze DFM when manufacturability—not cost—is the question",kicker:"Direct DFM analysis",summary:"Choose the intended process and governed rule pack before upload; a finding must identify what failed, where, why, and what to change.",actions:[["Open Analyze DFM","/analyze","app","primary"],["Download golden cube.step","cube-step","fixture"]],steps:["Open Analyze DFM and select the real target process; choose a rule pack only when it applies to this part.","Upload the golden STEP and wait for a terminal analysis.","Open each required-fix or advisory row; read code, severity, measured/required values, remediation, scope, and citation.","Follow any face/geometry link and confirm it selects the corresponding region before sharing the result."],expected:"The result persists under the exact bytes + process set + units + rule-pack version. Every displayed finding has structured severity/remediation/scope; localized findings link to geometry and governed findings retain citations.",evidence:"WORK-02 · exact analysis-variant/rule-pack cache regressions"},
    {id:"verify-formats",section:"Verify CAD",validation:"validated",title:"Units, aliases, malformed bytes, and tolerance edges fail honestly",kicker:"Basic to adversarial CAD",summary:"Supported aliases and unit variants complete; mislabeled, empty, oversized, corrupted, and boundary cases produce bounded recovery instead of fabricated geometry.",actions:[["Download valid-but-unmeshable STEP","fixtures/wire-only-unmeshable.step","asset","primary"]],steps:["Use STEP/STP, IGES/IGS, or STL bytes with the correct extension.","Confirm inch-derived fixtures normalize to millimetres.","In the designated test tenant, upload the wire-only fixture above and read the geometry-specific recovery message.","Correct the actual file—not merely its filename—and retry once."],expected:"Valid corpus files preserve exact geometry contracts. The wire-only STEP is structurally valid but has no tessellatable solid/shell, so it returns the documented bounded error and creates no analysis or cost evidence. Prior records and machine inventory remain unchanged.",evidence:"CAD-01–09 · VER-05 · FAIL-01/02 · wire fixture SHA a5d464dc…23a7"},
    {id:"parts-triage",section:"Verify CAD",validation:"validated",title:"Use Parts to find a part; use Triage to decide what needs attention",kicker:"Portfolio work queue",summary:"Parts is the durable catalog. Triage is a filtered, explainable queue over those same identities—not a second copy of the data.",actions:[["Open Parts","/verify?screen=catalog","app","primary"],["Open Triage","/verify?screen=triage","app"],["Download parts-master map","fixtures/parts-master-map.csv","asset"],["Download mixed parts manifest","fixtures/parts-manifest-mixed.csv","asset"]],steps:["Open Parts; filter Costed, Drafted, With findings, or No findings and open a row by exact part identity.","Import the map with the unmodified cube.step through the labeled parts-master onboarding control; confirm cube.step onboards, missing.step is reported missing, and mapping line 4 is rejected.","Open Triage; choose the exception class and review the reason each part entered the queue.","Open a triaged part, act on its source record, then return and confirm the rollup updates without changing unrelated rows."],expected:"Catalog filters, saved views, triage counts, and detail links reference the same organization-scoped part/hash. The fixture map parses two rows and rejects line 4; onboarding creates one real cube identity, reports missing.step, and fabricates no placeholder geometry.",evidence:"ENT-04/05 · Parts master and triage gates · fixture SHAs 118e15d1…ac5 / 567fc0c2…1268"},
    {id:"records-history",section:"Verify CAD",validation:"validated",title:"Use Records and History to reopen the exact evidence—not just the filename",kicker:"Immutable lookup",summary:"A filename may have many analyses and decisions. Open by record ID, timestamp, process context, and linked source identity.",actions:[["Open Records","/verify?screen=records","app","primary"],["Open analysis history","/history","app"],["Open cost history","/cost-decisions","app"]],steps:["Open Records and locate the expected filename; compare record ID, status, timestamp, and governing context.","Open the row and follow its linked analysis and decision IDs.","Refresh, use Back/Forward, and reopen from History.","If the source was deleted or revoked, confirm the old destination reports unavailable rather than selecting a different same-name record."],expected:"The same immutable IDs, bytes/hash, analysis variant, cost decision, governance, and source links survive navigation. Missing sources fail honestly; history never substitutes newest-by-filename.",evidence:"VER-04/09 · ENT-05 · durable record and source-identity oracles"},
    {id:"assembly-context",section:"Verify CAD",validation:"validated",title:"A part can carry parent assembly and service-world context",kicker:"Complex engineering context",summary:"Parent identity, coordinate system, transform, service environment, and seated render evidence stay attached to the verified part.",image:"19-portfolio-exposure.png",steps:["Assign the part to its parent assembly and program.","Declare material exposure, pressure, temperature, and corrosive environment.","Open the Verify stage and inspect the parent-context panel.","Move between stages and reopen the record."],expected:"The same parent, part, transform, and service values survive navigation; synthetic assembly fixtures render a real visual change from exploded to seated state.",evidence:"ENT-03/05 · assembly-visual-fidelity supplemental gate"},

    {id:"design-guardrails",section:"Design CAD",validation:"validated",title:"Describe only geometry the safe release can represent exactly",kicker:"Use case · Design Studio",summary:"Design Studio is intentionally bounded: mounting plate, L bracket, or open enclosure. Unsupported freeform requests are rejected—not approximated.",image:"07-design-unsupported.png",steps:["Open Design Studio.","Describe a plate, L bracket, or open enclosure with explicit millimetre dimensions.","Select Interpret safely.","Review every extracted field before generation."],expected:"An unsupported turbine or freeform request creates no project. Missing, contradictory, and unsafe dimensions are named instead of guessed.",evidence:"DES-01–04 · Design Studio golden matrix"},
    {id:"design-plate",section:"Design CAD",validation:"validated",title:"Generate the golden plate from exact dimensions",kicker:"Mounting plate",summary:"Use the validated sentence to learn the interpretation and generation pattern.",image:"10-design-plate.png",steps:["Enter: 120 × 70 × 8 mm plate with four 10 mm corner holes.","Select Interpret safely; confirm 120, 70, 8, 10, and 8.4 mm inset.","Select Generate design.","Wait for Ready before downloading or verifying."],expected:"The preview shows a plate with four holes; envelope is 120 × 70 × 8 mm and volume is 64.69 cm³, with deterministic STEP bytes and hash.",evidence:"DES-05 · structured artifact/hash oracle"},
    {id:"design-revise",section:"Design CAD",validation:"validated",title:"A revision creates R2; it never edits R1",kicker:"Immutable revision history",summary:"Revision history protects the answer to “which file did we quote?” even after refresh and archive/restore.",image:"11-design-revisions.png",steps:["Select Revise on the plate.","Change width from 120 to 130 mm.","Generate the revision and wait for Ready.","Select R1 in Revision history to prove the prior evidence still exists."],expected:"R2 becomes current at 130 × 70 × 8 mm; R1 remains downloadable with its original hash and bytes. Another project’s history never leaks into this view.",evidence:"DES-10/12/13 · cross-design history regression"},
    {id:"design-history",section:"Design CAD",validation:"validated",title:"Verify the exact historical revision you selected",kicker:"Design → Verify handoff",summary:"The handoff carries project, revision, filename, file size, and file hash. Current does not silently replace historical.",image:"12-design-verify-r1.png",steps:["While R1 is selected, choose Verify revision 1.","Wait for the Verify result.","Confirm the page states revision 1 while current is 2.","Confirm measured geometry returns to 120 × 70 × 8 mm."],expected:"Verify consumes R1 bytes—not R2—and reports the R1 64.69 cm³ geometry after refresh, back/forward, and restart.",evidence:"DES-11 · VER-09 identity continuity"},
    {id:"design-archive",section:"Design CAD",validation:"validated",title:"Archive removes a project from active work without destroying its revisions",kicker:"Archive and restore",summary:"Use archive for lifecycle state, not deletion. Every deterministic STEP revision and hash must remain recoverable.",actions:[["Open Design Studio","/designs","app","primary"]],steps:["From the project list, archive the completed test project and confirm the warning.","Switch to Archived and locate it by exact project identity.","Restore it once; refresh and confirm it returns to Active.","Open R1 and R2, then re-download both to confirm the archive cycle did not alter bytes or hashes."],expected:"Active → Archived → Active survives refresh with one project identity. Revision count, current revision, dimensions, STEP sizes, and hashes remain exact; repeated rapid actions create no duplicate project.",evidence:"DES-12/13 · WORK-11 archive/restore responsive-loop oracle"},
    {id:"design-shapes",section:"Design CAD",validation:"validated",title:"Bracket and enclosure stay prismatic through Verify",kicker:"Two additional safe templates",summary:"Recognizable shape is not enough; routing must also reject rotational false positives.",images:["13-design-bracket.png","14-design-enclosure.png"],steps:["Generate the default 80 × 50 × 60 mm L bracket at 6 mm thickness.","Verify it; CNC Turning must fail as a route.","Generate the default 80 × 50 × 60 mm enclosure with 3 mm walls and floor.","Verify it; identify thin-wall enclosure and reject turning."],expected:"Bracket volume is 40.20 cm³; enclosure volume is 54.41 cm³. Both complete DFM and cost without rotational routing.",evidence:"DES-06–09 · geometry and route oracles"},

    {id:"cost-direct",section:"Cost & Governance",validation:"validated",title:"Use direct Should-cost when you need economics without the full Verify workspace",kicker:"Direct cost workflow",summary:"The direct form uses the same real CAD parser and cost engine. Process, quantity, material, region, and shop context must be explicit enough to reproduce the result.",actions:[["Open Should-cost","/cost","app","primary"],["Download golden cube.step","cube-step","fixture"]],steps:["Open Should-cost and upload the golden STEP.","Set quantities to 1, 10, 100, and 1000; select the intended material/region and leave no accidental hidden defaults.","Run the estimate, then change the process using the visible process selector and run again.","Reconcile every unit cost to its line-item sum, confidence bounds, provenance, and saved decision ID."],expected:"Both real runs complete without timeout; the selected process changes the active result; each quantity has finite unit/fixed/variable cost, line items differ by less than $0.02 from unit cost, and the saved record reopens exactly.",evidence:"WORK-01 · human process-selector and numerical reconciliation oracle"},
    {id:"cost-workspace",section:"Cost & Governance",validation:"validated",title:"Should-cost is a saved evidence object—not a disposable estimate",kicker:"Use case · cost engineer",summary:"A completed Verify or direct Should-cost run creates the durable decision used by history, comparison, governance, and RFQ packages.",actions:[["Open Cost history","/cost-decisions","app","primary"]],steps:["Open Cost decisions after a successful verification or direct cost run.","Open the newest row for the uploaded filename and confirm its record ID.","Review make-now process, quantity ladder, confidence, and driver provenance.","Refresh and reopen the same decision by identity."],expected:"The record re-renders the same geometry, quantities, process, estimates, drivers, confidence, and decision JSON after reopen and refresh; the exact estimate count is read from that record, never assumed from this guide.",evidence:"WORK-03/04 · training-guide durable-cost oracle"},
    {id:"decision-approve",section:"Cost & Governance",validation:"validated",title:"Approval changes governance state—not the calculation",kicker:"Approve, note, and reopen",summary:"Approval is a sign-off layer around an immutable cost decision.",image:"15-decision-approve.png",steps:["Open a saved cost decision.","Add a decision note, select Approve, and confirm the approved state.","Refresh, then select Reopen when another review is required.","Confirm the status returns to Unreviewed."],expected:"Unreviewed → Approved → Unreviewed. Exact note, cost, geometry, drivers, and decision JSON remain unchanged.",evidence:"WORK-05 · governance branch oracle"},
    {id:"decision-stale",section:"Cost & Governance",validation:"validated",title:"A new governed rate makes the old decision visibly stale",kicker:"Re-cost trigger",summary:"Stale is protective: it stops a prior approval from looking current after its rate basis changes.",image:"16-decision-stale.png",steps:["Publish a new governed rate-card version as an administrator.","Return to the previously saved decision.","Read the stale warning and reason.","Re-run cost before relying on or packaging the decision."],expected:"The decision shows Stale and “Re-cost before relying on this record,” with reason rate_library_published.",evidence:"WORK-05 · governed-rate transition oracle"},
    {id:"compare-ab",section:"Cost & Governance",validation:"validated",title:"Compare A/B only after both decisions are durable",kicker:"Cost comparison",summary:"Comparison is a read of two saved records, not a recalculation that can quietly drift.",steps:["Open Compare A/B.","Select two durable decisions by filename and identity.","Read each quantity row, delta, process, approval, and stale flag.","Refresh and confirm the exact comparison reopens."],expected:"Every displayed value matches the compare API and source records; order, quantities, approval, stale state, and numerical deltas remain exact after reload.",evidence:"WORK-06 · 199-assertion compare/RFQ/key matrix"},
    {id:"exports",section:"Cost & Governance",validation:"validated",title:"Treat exports as reconciled evidence, not convenient attachments",kicker:"Download and handoff",summary:"A file is useful only when its content can be reconstructed back to the durable record that produced it.",steps:["Download only after the decision reaches the intended governance state.","Open the exported CSV, JSON, PDF, STEP, or ZIP.","Reconcile filename, identity, hash, quantity, cost, warnings, and approval.","Keep raw CAD inclusion explicit when sharing an RFQ package."],expected:"Browser downloads are non-empty, named correctly, parse successfully, and reproduce the source decision or design without hidden fallback content.",evidence:"DES-05/10/11 · WORK-06/08 · training-guide RFQ oracle"},
    {id:"public-share",section:"Cost & Governance",validation:"validated",title:"A public share is read-only, minimal, and revocable",kicker:"Controlled external review",summary:"Share only the reviewed should-cost view. The public payload must not disclose private organization, user, API-key, internal decision, or mesh-hash identifiers.",steps:["Open a reviewed cost decision and select Share; copy the generated public URL.","Open it in a private browser with no ProofShape session and confirm Shared should-cost · read-only.","Compare visible filename, governed result, and warnings; confirm there are no mutation controls or private identifiers.","Return as owner, revoke the share, then refresh both the public page and its API payload."],expected:"Before revocation, the public view is readable and mutation-free with a minimized payload. After revocation, both page and API return unavailable/404 while the owner record persists with sharing disabled.",evidence:"WORK-07 · unauthenticated payload privacy + owner revoke lifecycle"},

    {id:"machine-floor",section:"Manufacturing",validation:"validated",title:"Declare the machines and rates the organization actually owns",kicker:"Use case · manufacturing lead",summary:"Form authoring, zero-value handling, CSV mixed rows, retry, reload, and governed-rate display are exercised through the browser.",image:"17-machine-floor.png",actions:[["Open Your machines","/verify?screen=machines","app","primary"],["Download mixed machine import CSV","machine-csv","fixture"]],steps:["Open Your machines and select Add machine.","For the practice row enter name QA CNC Mill, process cnc_3axis, $95/hour, 200 kg maximum workpiece, envelope x/y/z 500 × 400 × 300 mm, aluminum; count 1.","Import the provided mixed CSV; line 2 is valid and line 3 intentionally has count=not-a-number. Inspect the exact imported/skipped totals and line-3 reason.","Reload and confirm the valid inventory and provenance; retry the same CSV to prove it does not remove existing machines."],expected:"Exactly one valid cnc_3axis row imports and the intentional line 3 is skipped with count-not-an-integer copy. The authored machine persists; valid zero values remain zero; retry never removes existing machines.",evidence:"MFG-01–06 · ENT-01 manufacturing/CAD matrix · embedded fixture SHA dc96692c…5306"},
    {id:"calibration",section:"Manufacturing",validation:"validated",title:"Practice data must never masquerade as measured accuracy",kicker:"Ground truth floor and successful source binding",summary:"The downloadable rows are intentionally tagged demo/stand-in. They prove import and refusal safely; real calibration succeeds only with customer actuals bound to source hashes already accepted by Verify or Should-cost.",image:"18-calibration.png",actions:[["Open Calibration & truth","/verify?screen=calibration","app","primary"],["Download safe mixed actuals CSV","fixtures/ground-truth-mixed.csv","asset"]],steps:["Successfully upload the unmodified cube.step first so its source SHA exists in the organization evidence store.","Import the provided CSV: exactly 8 rows import as stand-ins and line 10 is rejected with all stated field errors.","Select Recalibrate and confirm the safe practice result is refused as 0 real of 8 needed; refresh and confirm the state persists.","For a real measured run, use at least eight genuine invoice/quote rows, source_type actual/quote/invoice, and each exact prior source SHA; then review held-out count, skipped reasons, and measured metrics before accepting the band."],expected:"The practice file can never flip a band solid. In the isolated release test, eight test-tenant actual records bound to a durably captured STEP source complete with zero skipped records and measured held-out metrics; customer accuracy is never inferred from those test facts.",evidence:"ENT-02 · source-artifact/calibration success contract · safe fixture SHA 16cd702c…62a"},
    {id:"severe-service",section:"Manufacturing",validation:"validated",title:"Severe service rejects unsafe materials before recovering a route",kicker:"120 °C · sour service · 35 MPa",summary:"Complex service constraints must change feasibility—not merely decorate the record.",steps:["In Verify select Polymer, 120 °C service, sour service, and 35 MPa pressure; upload the golden STEP.","Read every returned environment exclusion and confirm each visible reason cites NACE, HDT, ASME, ASTM, or ISO evidence.","Confirm the surviving PEEK capability is explicit as makeable_not_on_owned on the declared inventory.","Select Stainless without re-uploading; wait for a fresh result and confirm makeable_in_house."],expected:"One or more unsafe polymer routes are excluded with standards-cited reasons visible in the UI; PEEK remains an explicit owned-capability gap; the declared stainless route recovers to makeable_in_house and the USER service context persists.",evidence:"ENT-03 · exact context/verdict/citation browser oracle"},
    {id:"programs",section:"Manufacturing",validation:"validated",title:"Program exposure appears only after exact-volume verification",kicker:"Program and annual economics",summary:"ProofShape withholds annualized exposure until the engine has a recommendation at the declared quantity.",image:"20-program-exposure.png",actions:[["Open Programs","/verify?screen=programs","app","primary"],["Download mixed parts manifest","fixtures/parts-manifest-mixed.csv","asset"]],steps:["Import the manifest and confirm exactly two valid rows plus the intentional line-4 rejection.","Assign the verified part to a program and parent assembly; declare units per parent and annual volume.","Re-verify at the exact annual quantity.","Open Programs and confirm the part, missing-evidence state, and exposure roll up without inventing economics for the rejected row."],expected:"For the pinned program oracle: 12,000 units × $10.08 = $120,960/year. The single-part $133.58 headline and any row without exact-volume evidence are explicitly rejected as annual bases.",evidence:"ENT-04 · exact-economics oracle · manifest SHA 567fc0c2…1268"},

    {id:"batch",section:"Batch & Sourcing",validation:"validated",title:"A ZIP batch must finish before its CSV becomes evidence",kicker:"Use case · many parts",summary:"Batch creation, worker progress, mounted-row refresh, result identity, CSV, and archive recovery are exercised as a user sees them.",image:"27-batch.png",steps:["Create a ZIP containing supported CAD files; exclude quote CSVs.","Open Batch run, select the ZIP, and choose Start batch.","Wait for both summary and mounted item row to say Completed.","Download CSV and reconcile one row per item."],expected:"The one-part ZIP reaches Completed 1/1 without reload; CSV headers, filename, status, verdict, process, duration, analysis URL, and error field reconcile.",evidence:"WORK-02/11 · batch/recovery golden matrix"},
    {id:"batch-recovery",section:"Batch & Sourcing",validation:"validated",title:"A worker or status fault must not strand or duplicate the batch",kicker:"Queue and refresh recovery",summary:"The browser is forced through create races, stale status, reload, injected 500, retry, and persisted-identity recovery.",image:"27-batch.png",steps:["Keep the batch page open when status becomes unavailable.","Read the actionable worker/status message; do not resubmit blindly.","Refresh or choose the stated retry action once.","Confirm the original batch ID completes and CSV remains singular."],expected:"A single durable batch reaches Completed 1/1 after recovery; no duplicate analysis, stranded item, false success, or lost mounted-row state remains.",evidence:"FAIL-04/05/10 · batch race and rollback regressions"},
    {id:"batch-cancel",section:"Batch & Sourcing",validation:"validated",title:"Cancel the original batch; do not create a second one to escape it",kicker:"Cancellation and worker lease recovery",summary:"Cancellation must settle every child item and survive a worker being interrupted after it durably claimed work.",actions:[["Open Batch","/batch","app","primary"],["Download one-part batch ZIP","batch-zip","fixture"]],steps:["Start the provided batch ZIP in the test tenant and note the durable batch ID.","While work is pending or processing, select Cancel and confirm the destructive action once.","Refresh the same batch ID and inspect every item state.","In the recovery test, interrupt a claimed worker; confirm the item is released or reclaimed, then allow the original batch to finish on retry."],expected:"A cancelled parent has no pending/queued/processing children and never later becomes Completed. A worker cancellation releases the processing lease; stale-lease fallback requeues only after the hard timeout safety margin and links the exact persisted analysis variant.",evidence:"WORK-11 · cancellation BaseException regression · 660-second stale lease recovery"},
    {id:"rfq",section:"Batch & Sourcing",validation:"validated",title:"Build an RFQ bundle from saved decisions—without contacting a supplier",kicker:"Use case · sourcing lead",summary:"ProofShape generates a durable evidence bundle. Supplier transmission remains a separate controlled action.",image:"26-rfq-packages.png",steps:["Open RFQ packages after saving cost decisions.","Enter title, supplier, and optional buyer note.","Select decisions; read stale, unapproved, and raw-CAD warnings.","Generate, reopen, then Download ZIP."],expected:"For the pinned cube, manifest, line item, supplier brief, exact decision JSON, 48 estimate/driver rows, required part context, warnings, raw-CAD boundary, and a real parsed PDF reconcile with the immutable package snapshot. PDF-unavailable is a release failure for this golden path.",evidence:"WORK-08 · training-guide RFQ semantic PDF/ZIP oracle"},

    {id:"integrations",section:"Administration",validation:"partial",title:"Connector simulation proves the contract—not a live vendor relationship",kicker:"Integration boundary",summary:"Local SAP and Windchill fixtures, CSV normalization, credential lifecycle, import, idempotent retry, and secret redaction pass. Vendor acceptance requires a real sandbox.",image:"25-integrations.png",actions:[["Open Integrations","/integrations","app","primary"],["Download SAP sandbox replay","fixtures/sap-s4hana-sandbox.json","asset"],["Download Windchill sandbox replay","fixtures/windchill-sandbox.json","asset"],["Download normalized manifest","fixtures/parts-manifest-mixed.csv","asset"]],steps:["Open Integrations and read the connector and read-only boundary.","Use the offline replays to confirm SAP normalizes 2 products + 1 BOM edge and Windchill normalizes 2 parts + 1 usage edge, each with zero warnings.","Create a profile only for an approved real sandbox endpoint; dry-run, import, and retry while comparing normalized rows.","Revoke the profile and confirm no secret appears in responses."],expected:"Offline fixture rows remain exact and retry creates no duplicates. PARTIAL means no claim that SAP or Windchill accepted a live connection until their real sandboxes are configured and accepted.",evidence:"WORK-09/10 · SAP SHA 31aa45fe…664f · Windchill SHA 5ff55031…307 · live vendor gate external"},
    {id:"api-keys",section:"Administration",validation:"validated",title:"Create an API key once, then treat the secret as gone",kicker:"Use case · developer/admin",summary:"Developer settings reveals the full key exactly once; later screens retain only its prefix and current status.",image:"21-developer-settings.png",steps:["Open API & docs / Developer settings.","Create a key and use it once against the API.","Reload, rotate, and confirm the old key is rejected.","Revoke the replacement and confirm it is rejected and visibly Revoked."],expected:"Create/use/reload/rotate/reject-old/use-new/revoke/reject-new all pass; durable status and audit state survive reload while the dashboard session remains separate.",evidence:"WORK-12 · compare/RFQ/key browser matrix"},
    {id:"org-security",section:"Administration",validation:"validated",title:"Configure organization and security surfaces before inviting work",kicker:"Administrative onboarding",summary:"Organization identity, member roles, password/session controls, and provider-specific SSO/SCIM boundaries are explicit.",images:["28-security-settings.png","29-organization-settings.png"],steps:["Open Organization and confirm the tenant identity.","Invite only the intended person and assign the least-privileged role.","Open Security and review password, session, SSO, and SCIM state.","Use test users before changing production access."],expected:"The organization and security pages show real configured state, not seeded facts. Local SAML/SCIM lifecycle contracts pass; a live IdP remains an external staging acceptance gate.",evidence:"AUTH-03 · SCIM/IdP lifecycle supplemental gate"},
    {id:"role-boundaries",section:"Administration",validation:"validated",title:"A viewer can read allowed evidence but cannot administer the organization",kicker:"Role and tenant isolation",summary:"The full browser matrix substitutes IDs, downloads, cache/worker paths, and credentials across two organizations and role levels.",image:"22-viewer-gate.png",steps:["Sign in as viewer and open permitted evidence.","Attempt an administrator operation in the test tenant.","Substitute another organization’s record and download IDs.","Repeat after refresh and worker-backed operations."],expected:"Viewer administration returns 403; cross-tenant records never render or download; API keys, cache values, worker writes, notifications, and recovery remain bound to the issuing organization.",evidence:"ROLE-01–04 · two-tenant browser boundary matrix"},
    {id:"reconstruction-boundary",section:"Administration",validation:"partial",title:"Reconstruction is available only with an approved geometry backend",kicker:"Honest capability boundary",summary:"The local production candidate intentionally has no model endpoint or remote egress for reconstruction. It must not fake a mesh.",steps:["Open reconstruction only when the organization has an approved backend configured.","If the service is unavailable, read the stated upload recovery.","Upload the source CAD through Verify instead.","Escalate provider configuration to an administrator."],expected:"Without an approved backend, the endpoint returns an actionable 501 boundary and creates no fabricated mesh. A live reconstruction claim requires provider, accuracy, security, and customer-file acceptance.",evidence:"ENT-05 actionable recovery · external provider/accuracy gate"},

    {id:"recovery",section:"Recovery",validation:"validated",dark:true,title:"Recover from the stated cause",kicker:"Ten required recovery contracts",summary:"Authentication, validation, throttling, missing records, conflicts, worker/store faults, offline, and restart paths are exercised through the browser.",image:"23-login-recovery.png",steps:["Preserve the filename, route, timestamp, and record ID.","Correct credentials, bytes, permissions, or service health.","Use the displayed retry or refresh action once.","Confirm the original object completes or remains safely unchanged."],expected:"401, 403, 404, 409, 422, 429, and 500 states show bounded next actions; FAIL-01–10 recover without duplicate or corrupted evidence.",evidence:"FAIL-01–10 · mobile/recovery and domain matrices"},
