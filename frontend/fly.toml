app = "cadvrfy-web"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  API_BASE = "https://cadvrfy-api.fly.dev"
  NEXT_PUBLIC_API_BASE = "https://cadvrfy-api.fly.dev"
  NEXT_PUBLIC_VERIFY_UI = "1"
  NEXT_PUBLIC_SHOW_DEV_TOOLS = "0"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
